<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мониторинг мероприятий - Альметьевский политехнический техникум</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
<div class="app-container" id="app">
    <div class="loader">Загрузка...</div>
</div>

<script>
    const STATUSES = ["Республиканский", "Муниципальный (Городской)", "Федеральный", "Всероссийский", "Международный"];
    const RESULTS = ["Участие", "Диплом 1 место", "Диплом 2 место", "Диплом 3 место", "Номинация"];
    const PRIZE_RESULTS = ["Диплом 1 место", "Диплом 2 место", "Диплом 3 место", "Номинация"];

    // ⚠️ ВАЖНО: Замените этот URL на ваш актуальный URL веб-приложения Google Apps Script
    const API_URL = "https://script.google.com/macros/s/AKfycbwOdqs-AEN_oTNVD0n10SuAzZs2KhGxxLYv6w-VD4orw5aSAXvXHMJMx-XtlXwX4Ps/exec";

    function formatDate(dateString) {
        if (!dateString) return "Дата не указана";
        if (/^\d{2}\.\d{2}\.\d{4}$/.test(dateString)) return dateString;
        if (typeof dateString === 'number' && dateString > 40000) {
            let date = new Date((dateString - 25569) * 86400000);
            let day = date.getDate().toString().padStart(2, '0');
            let month = (date.getMonth() + 1).toString().padStart(2, '0');
            let year = date.getFullYear();
            return `${day}.${month}.${year}`;
        }
        try {
            let date = new Date(dateString);
            if (!isNaN(date.getTime())) {
                let day = date.getDate().toString().padStart(2, '0');
                let month = (date.getMonth() + 1).toString().padStart(2, '0');
                let year = date.getFullYear();
                return `${day}.${month}.${year}`;
            }
        } catch(e) {}
        return dateString;
    }

    let currentUser = null;
    let currentModule = "student_contests";
    let currentStatus = STATUSES[0];
    let eventsData = {};
    let studentOlympiads = [];
    let teacherContests = [];
    let teacherArticles = [];
    let commissions = [];
    let ccTeachers = [];
    let selectedTeacher = null;
    let teacherEvents = [];
    let teacherAchievements = [];
    let teacherPersonalArticles = [];
    let pendingParticipants = [];

    async function apiCall(action, data = {}) {
        try {
            const url = `${API_URL}?action=${action}&data=${encodeURIComponent(JSON.stringify(data))}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.success) return result.data;
            console.error('API Error:', result.error);
            return null;
        } catch (err) {
            console.error('Network Error:', err);
            return null;
        }
    }

    async function loadUsers() {
        // Принудительно загружаем с сервера, игнорируем кэш
        const users = await apiCall("getUsers");
        if (users) {
            localStorage.setItem("monitoring_users_cache", JSON.stringify(users));
            return users;
        }
        const cached = localStorage.getItem("monitoring_users_cache");
        return cached ? JSON.parse(cached) : {};
    }

    async function loadEvents() {
        const events = await apiCall("getEvents");
        if (events) { localStorage.setItem("monitoring_events_cache", JSON.stringify(events)); return events; }
        const cached = localStorage.getItem("monitoring_events_cache");
        return cached ? JSON.parse(cached) : {};
    }

    async function loadStudentOlympiads() {
        const olympiads = await apiCall("getStudentOlympiads");
        if (olympiads) return olympiads;
        return [];
    }

    async function loadTeacherContests() {
        const contests = await apiCall("getTeacherContests");
        if (contests) return contests;
        return [];
    }

    async function loadTeacherArticles() {
        const articles = await apiCall("getTeacherArticles");
        if (articles) return articles;
        return [];
    }

    async function loadCommissions() {
        const data = await apiCall("getCycleCommissions");
        if (data) { commissions = data.slice(1).map(row => ({ id: row[0], name: row[1], chairman_username: row[2], chairman_name: row[3] })); return commissions; }
        return [];
    }

    async function loadCCTeachers(ccId) {
        const data = await apiCall("getCCTeachers", { cc_id: ccId });
        if (data) { ccTeachers = data; return ccTeachers; }
        return [];
    }

    async function loadTeacherEvents(teacherName) {
        const data = await apiCall("getTeacherEventsFromMonitoring", { teacher_name: teacherName });
        if (data) { teacherEvents = data; return teacherEvents; }
        return [];
    }

    async function loadTeacherAchievements(teacherId) {
        const data = await apiCall("getTeacherAchievements", { teacher_id: teacherId });
        if (data) { teacherAchievements = data; return teacherAchievements; }
        return [];
    }

    async function saveEventToServer(eventData) { return await apiCall("saveEvent", eventData); }
    async function updateEventOnServer(eventData) { return await apiCall("updateEvent", eventData); }
    async function deleteEventOnServer(eventId) { return await apiCall("deleteEvent", { eventId }); }
    async function updateServiceNoteOnServer(eventId, written, date) { return await apiCall("updateServiceNote", { eventId, written, date }); }
    
    async function saveStudentOlympiadToServer(data) { return await apiCall("saveStudentOlympiad", data); }
    async function updateStudentOlympiadOnServer(data) { return await apiCall("updateStudentOlympiad", data); }
    async function deleteStudentOlympiadOnServer(id) { return await apiCall("deleteStudentOlympiad", { id }); }
    
    async function saveTeacherContestToServer(data) { return await apiCall("saveTeacherContest", data); }
    async function updateTeacherContestOnServer(data) { return await apiCall("updateTeacherContest", data); }
    async function deleteTeacherContestOnServer(id) { return await apiCall("deleteTeacherContest", { id }); }
    
    async function saveTeacherArticleToServer(data) { return await apiCall("saveTeacherArticle", data); }
    async function updateTeacherArticleOnServer(data) { return await apiCall("updateTeacherArticle", data); }
    async function deleteTeacherArticleOnServer(id) { return await apiCall("deleteTeacherArticle", { id }); }
    
    async function saveTeacherAchievementToServer(data) { return await apiCall("saveTeacherAchievement", data); }
    async function deleteTeacherAchievementOnServer(id) { return await apiCall("deleteTeacherAchievement", { id }); }
    
    async function addCCTeacherToServer(data) { return await apiCall("addCCTeacher", data); }
    async function updateCCTeacherOnServer(data) { return await apiCall("updateCCTeacher", data); }
    async function deleteCCTeacherOnServer(id) { return await apiCall("deleteCCTeacher", { id }); }
    
    async function addCycleCommissionToServer(data) { return await apiCall("addCycleCommission", data); }
    async function updateCycleCommissionOnServer(data) { return await apiCall("updateCycleCommission", data); }
    async function deleteCycleCommissionOnServer(id) { return await apiCall("deleteCycleCommission", { id }); }
    
    async function saveUserToServer(data) { return await apiCall("saveUser", data); }
    async function deleteUserOnServer(login) { return await apiCall("deleteUser", { login }); }

    function sortByDate(items) {
        return [...items].sort((a, b) => {
            const dateA = a.date.split('.').reverse().join('-');
            const dateB = b.date.split('.').reverse().join('-');
            return dateA.localeCompare(dateB);
        });
    }

    function groupParticipantsBySupervisor(participants) {
        const groups = {};
        for (const p of participants) {
            const sup = p.supervisor || "—";
            if (!groups[sup]) groups[sup] = [];
            groups[sup].push(p);
        }
        return groups;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getTeacherStats(events) {
        const stats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 };
        let total = 0;
        for (const ev of events) {
            for (const p of ev.participants) {
                stats[p.result] = (stats[p.result] || 0) + 1;
                total++;
            }
        }
        return { stats, total };
    }

    function render() {
        const app = document.getElementById('app');
        if (!currentUser) {
            app.innerHTML = renderLogin();
            attachLoginEvents();
        } else {
            app.innerHTML = renderMain();
            attachMainEvents();
        }
    }

    function renderLogin() {
        return `
            <div class="main-content" style="max-width: 450px; margin: 5rem auto;">
                <div class="panel" style="text-align: center;">
                    <div style="margin-bottom: 1.5rem;">
                        <h2 style="color: var(--primary);">Мониторинг мероприятий</h2>
                        <p style="color: var(--secondary);">Научно-методический отдел</p>
                        <p style="font-size: 0.85rem;">Альметьевский политехнический техникум</p>
                    </div>
                    <div class="form-group">
                        <label>Логин</label>
                        <input type="text" id="login" placeholder="Введите логин (латиницей)" value="kamalova">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="password" placeholder="Введите пароль" value="kamalova123">
                    </div>
                    <button id="loginBtn" style="margin-top: 1rem; width: 100%;">🔑 ВОЙТИ</button>
                    <div style="margin-top: 1rem; font-size: 0.75rem; color: var(--secondary);">
                        <p>Тестовые учетные записи:</p>
                        <p>admin / admin123</p>
                        <p>kamalova / kamalova123</p>
                        <p>rahuba / rahuba123</p>
                    </div>
                </div>
            </div>
        `;
    }

    function renderMain() {
        const role = currentUser.role;
        const isAdmin = role === 'admin';
        const isEditor = role === 'editor';
        const isChairman = role === 'chairman';
        
        let navHtml = `
            <div class="nav-buttons">
                <button class="nav-btn ${currentModule === 'student_contests' ? 'active' : ''}" data-module="student_contests">🎓 Студенты (конкурсы)</button>
                <button class="nav-btn ${currentModule === 'student_olympiads' ? 'active' : ''}" data-module="student_olympiads">🏅 Студенты (олимпиады)</button>
                <button class="nav-btn ${currentModule === 'teacher_contests' ? 'active' : ''}" data-module="teacher_contests">👨‍🏫 Преподаватели (конкурсы)</button>
                <button class="nav-btn ${currentModule === 'teacher_articles' ? 'active' : ''}" data-module="teacher_articles">📄 Преподаватели (статьи)</button>
                ${isChairman ? `<button class="nav-btn ${currentModule === 'mycc' ? 'active' : ''}" data-module="mycc">👥 Мой ЦК</button>` : ''}
                ${isAdmin ? `<button class="nav-btn ${currentModule === 'managecc' ? 'active' : ''}" data-module="managecc">⚙️ Управление ЦК</button>` : ''}
            </div>
        `;
        
        if (currentModule === 'student_contests') return renderStudentContests(navHtml, isAdmin, isEditor);
        if (currentModule === 'student_olympiads') return renderStudentOlympiads(navHtml, isAdmin, isEditor);
        if (currentModule === 'teacher_contests') return renderTeacherContests(navHtml, isAdmin, isEditor);
        if (currentModule === 'teacher_articles') return renderTeacherArticles(navHtml, isAdmin, isEditor);
        if (currentModule === 'mycc' && isChairman) return renderMyCC(navHtml);
        if (currentModule === 'managecc' && isAdmin) return renderManageCC(navHtml);
        
        return renderStudentContests(navHtml, isAdmin, isEditor);
    }

    // [Здесь будут все функции рендеринга - они остаются без изменений]
    // Для экономии места я не буду дублировать весь код рендеринга,
    // так как он остался таким же, как в вашем исходном файле.
    // В полной версии все функции рендеринга должны быть здесь.
    
    // ВАЖНО: В полной версии файла все функции renderStudentContests, 
    // renderStudentOlympiads, renderTeacherContests, renderTeacherArticles,
    // renderMyCC, renderTeacherProfile, renderManageCC должны быть здесь.
    
    // Для краткости я показываю только исправленную функцию openUserManagement,
    // которая была основной проблемой:

    async function openUserManagement() {
        // Принудительно загружаем свежие данные с сервера
        const users = await apiCall("getUsers");
        
        if (!users || Object.keys(users).length === 0) {
            alert("Не удалось загрузить список пользователей! Проверьте подключение к интернету.");
            return;
        }
        
        let userList = "📋 ТЕКУЩИЕ ПОЛЬЗОВАТЕЛИ:\n\n";
        for (const [login, data] of Object.entries(users)) {
            userList += `🔹 Логин: ${login}\n   Имя: ${data.name}\n   Роль: ${data.role}\n   ЦК ID: ${data.cc_id || '—'}\n\n`;
        }
        
        const action = prompt(`${userList}\n\n✏️ Что сделать?\n\n1 - Добавить пользователя\n2 - Удалить пользователя\n3 - Назад`, "3");
        
        if (action === "1") {
            const newLogin = prompt("🔑 Введите логин (латиницей, только буквы и цифры):");
            if (!newLogin) return;
            
            // Проверка на существующего пользователя
            if (users[newLogin]) {
                alert(`❌ Пользователь с логином "${newLogin}" уже существует!`);
                return;
            }
            
            const newPassword = prompt("🔒 Введите пароль:");
            if (!newPassword) return;
            
            const newName = prompt("👤 Введите полное имя (например: Иванова А.А.):");
            if (!newName) return;
            
            const newRole = prompt("👔 Выберите роль:\n- admin (администратор)\n- editor (методист)\n- viewer (просмотр)\n- chairman (председатель ЦК)\n\nВведите роль:", "viewer");
            if (!newRole || !["admin", "editor", "viewer", "chairman"].includes(newRole.toLowerCase())) {
                alert("❌ Неверная роль! Доступные роли: admin, editor, viewer, chairman");
                return;
            }
            
            let ccId = null;
            if (newRole.toLowerCase() === "chairman") {
                ccId = prompt("🏢 Введите ID ЦК (1-12):");
                if (!ccId || isNaN(parseInt(ccId))) {
                    alert("❌ Неверный ID ЦК!");
                    return;
                }
                ccId = parseInt(ccId);
            }
            
            const result = await saveUserToServer({ 
                login: newLogin.toLowerCase(), 
                password: newPassword, 
                name: newName, 
                role: newRole.toLowerCase(), 
                cc_id: ccId 
            });
            
            if (result) {
                alert(`✅ Пользователь ${newLogin} успешно добавлен!`);
                // Очищаем кэш
                localStorage.removeItem("monitoring_users_cache");
                // Обновляем текущего пользователя если нужно
                render();
            } else { 
                alert("❌ Ошибка при добавлении пользователя! Проверьте подключение к интернету."); 
            }
            
        } else if (action === "2") {
            const deleteLogin = prompt("🗑 Введите логин пользователя для удаления:");
            if (!deleteLogin) return;
            
            if (deleteLogin === "muhanov") { 
                alert("❌ Нельзя удалить главного администратора!"); 
                return; 
            }
            
            if (!users[deleteLogin]) {
                alert(`❌ Пользователь с логином "${deleteLogin}" не найден!`);
                return;
            }
            
            const confirmDelete = confirm(`⚠️ ВНИМАНИЕ! Вы действительно хотите удалить пользователя:\n\nЛогин: ${deleteLogin}\nИмя: ${users[deleteLogin].name}\nРоль: ${users[deleteLogin].role}\n\nЭто действие НЕОБРАТИМО!`);
            
            if (confirmDelete) {
                const result = await deleteUserOnServer(deleteLogin);
                if (result) {
                    alert(`✅ Пользователь ${deleteLogin} успешно удален!`);
                    localStorage.removeItem("monitoring_users_cache");
                    render();
                } else {
                    alert("❌ Ошибка при удалении пользователя!");
                }
            }
        }
    }

    function attachLoginEvents() {
        document.getElementById('loginBtn')?.addEventListener('click', async () => {
            const login = document.getElementById('login').value.trim().toLowerCase();
            const password = document.getElementById('password').value.trim();
            
            console.log("Попытка входа:", login);
            
            const users = await loadUsers();
            console.log("Загружено пользователей:", Object.keys(users));
            
            if (users[login] && users[login].password === password) {
                console.log("Успешный вход для:", login);
                currentUser = { ...users[login], username: login };
                eventsData = await loadEvents();
                studentOlympiads = await loadStudentOlympiads();
                teacherContests = await loadTeacherContests();
                teacherArticles = await loadTeacherArticles();
                await loadCommissions();
                if (currentUser.role === 'chairman' && currentUser.cc_id) {
                    await loadCCTeachers(currentUser.cc_id);
                }
                render();
            } else {
                if (!users[login]) {
                    alert(`❌ Пользователь "${login}" не найден в базе данных!\n\nДоступные логины: ${Object.keys(users).join(", ")}`);
                } else {
                    alert("❌ Неверный пароль!");
                }
            }
        });
    }

    function attachMainEvents() {
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentModule = btn.dataset.module;
                selectedTeacher = null;
                render();
            });
        });
        
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentStatus = btn.dataset.status;
                render();
            });
        });
        
        const manageUsersBtn = document.getElementById('manageUsersBtn');
        if (manageUsersBtn) {
            manageUsersBtn.addEventListener('click', () => openUserManagement());
        }
        
        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            currentUser = null;
            selectedTeacher = null;
            render();
        });
        
        document.getElementById('copyAllBtn')?.addEventListener('click', () => copyAllText());
        document.getElementById('copyStatsBtn')?.addEventListener('click', () => copyStats());
        document.getElementById('refreshBtn')?.addEventListener('click', async () => {
            if (currentModule === 'student_contests') eventsData = await loadEvents();
            if (currentModule === 'student_olympiads') studentOlympiads = await loadStudentOlympiads();
            if (currentModule === 'teacher_contests') teacherContests = await loadTeacherContests();
            if (currentModule === 'teacher_articles') teacherArticles = await loadTeacherArticles();
            render();
        });
        
        // Остальные обработчики остаются без изменений
        if (currentUser?.role === 'editor') {
            document.getElementById('markServiceNoteBtn')?.addEventListener('click', () => openMarkNoteWindow());
            document.getElementById('generateServiceNoteBtn')?.addEventListener('click', () => openMultiGenerateNoteWindow());
            document.getElementById('markServiceNoteOlympiadBtn')?.addEventListener('click', () => openMarkOlympiadNoteWindow());
        }
        
        // Административные обработчики
        if (currentUser?.role === 'admin') {
            // ... (остальной код для админа)
        }
    }

    // Вспомогательные функции (копирование, служебные записки и т.д.)
    function copyAllText() { alert("Функция копирования"); }
    function copyStats() { alert("Функция копирования статистики"); }
    async function openMarkNoteWindow() { alert("Отметка служебной записки"); }
    async function openMarkOlympiadNoteWindow() { alert("Отметка служебной записки для олимпиады"); }
    function openMultiGenerateNoteWindow() { alert("Формирование служебной записки"); }

    (async function init() {
        console.log("Инициализация приложения...");
        eventsData = await loadEvents();
        studentOlympiads = await loadStudentOlympiads();
        teacherContests = await loadTeacherContests();
        teacherArticles = await loadTeacherArticles();
        await loadCommissions();
        render();
    })();
</script>
</body>
