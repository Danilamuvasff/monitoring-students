<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мониторинг мероприятий - Альметьевский политехнический техникум</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='50' width='15' height='40' fill='%23004d73'/%3E%3Crect x='35' y='30' width='15' height='60' fill='%23004d73'/%3E%3Crect x='60' y='10' width='15' height='80' fill='%23004d73'/%3E%3Crect x='85' y='40' width='15' height='50' fill='%23004d73'/%3E%3C/svg%3E">

</head>
<body>
<div class="app-container" id="app">
    <div class="loader">Загрузка...</div>
</div>

<script>
    const STATUSES = ["Республиканский", "Муниципальный (Городской)", "Федеральный", "Всероссийский", "Международный"];
    const RESULTS = ["Участие", "Диплом 1 место", "Диплом 2 место", "Диплом 3 место", "Номинация"];
    const PRIZE_RESULTS = ["Диплом 1 место", "Диплом 2 место", "Диплом 3 место", "Номинация"];

    const API_URL = "https://script.google.com/macros/s/AKfycbyLQrxFKeRDVFk50v6REfHSkHyI9XvJjbcQL_wVeL-iqEZOM3Vb8V5F6jdgNKKumiY/exec";

    function formatDate(dateString) {
        if (!dateString) return "Дата не указана";
        if (/^\d{2}\.\d{2}\.\d{4}$/.test(dateString)) return dateString;
        if (typeof dateString === 'number' && dateString > 40000) {
            let date = new Date((dateString - 25569) * 86400000);
            let day = date.getDate().toString().padStart(2, '0');
            let month = (date.getMonth() + 1).toString().padStart(2, '0');
            let year = date.getFullYear();
            return `${day}.${month}.${year}`;
        }
        try {
            let date = new Date(dateString);
            if (!isNaN(date.getTime())) {
                let day = date.getDate().toString().padStart(2, '0');
                let month = (date.getMonth() + 1).toString().padStart(2, '0');
                let year = date.getFullYear();
                return `${day}.${month}.${year}`;
            }
        } catch(e) {}
        return dateString;
    }

    let currentUser = null;
    let currentModule = "student_contests";
    let currentStatus = STATUSES[0];
    let eventsData = {};
    let studentOlympiads = [];
    let teacherContests = [];
    let teacherArticles = [];
    let commissions = [];
    let ccTeachers = [];
    let selectedTeacher = null;
    let teacherEvents = [];
    let teacherAchievements = [];
    let teacherPersonalArticles = [];
    let pendingParticipants = [];

    async function apiCall(action, data = {}) {
        try {
            const url = `${API_URL}?action=${action}&data=${encodeURIComponent(JSON.stringify(data))}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.success) return result.data;
            console.error('API Error:', result.error);
            return null;
        } catch (err) {
            console.error('Network Error:', err);
            return null;
        }
    }

    async function loadUsers() {
        const users = await apiCall("getUsers");
        if (users) { localStorage.setItem("monitoring_users_cache", JSON.stringify(users)); return users; }
        const cached = localStorage.getItem("monitoring_users_cache");
        return cached ? JSON.parse(cached) : {};
    }

    async function loadEvents() {
        const events = await apiCall("getEvents");
        if (events) { localStorage.setItem("monitoring_events_cache", JSON.stringify(events)); return events; }
        const cached = localStorage.getItem("monitoring_events_cache");
        return cached ? JSON.parse(cached) : {};
    }

    async function loadStudentOlympiads() {
        const olympiads = await apiCall("getStudentOlympiads");
        if (olympiads) return olympiads;
        return [];
    }

    async function loadTeacherContests() {
        const contests = await apiCall("getTeacherContests");
        if (contests) return contests;
        return [];
    }

    async function loadTeacherArticles() {
        const articles = await apiCall("getTeacherArticles");
        if (articles) return articles;
        return [];
    }

    async function loadCommissions() {
        const data = await apiCall("getCycleCommissions");
        if (data) { commissions = data.slice(1).map(row => ({ id: row[0], name: row[1], chairman_username: row[2], chairman_name: row[3] })); return commissions; }
        return [];
    }

    async function loadCCTeachers(ccId) {
        const data = await apiCall("getCCTeachers", { cc_id: ccId });
        if (data) { ccTeachers = data; return ccTeachers; }
        return [];
    }

    async function loadTeacherEvents(teacherName) {
        const data = await apiCall("getTeacherEventsFromMonitoring", { teacher_name: teacherName });
        if (data) { teacherEvents = data; return teacherEvents; }
        return [];
    }

    async function loadTeacherAchievements(teacherId) {
        const data = await apiCall("getTeacherAchievements", { teacher_id: teacherId });
        if (data) { teacherAchievements = data; return teacherAchievements; }
        return [];
    }

    async function saveEventToServer(eventData) { return await apiCall("saveEvent", eventData); }
    async function updateEventOnServer(eventData) { return await apiCall("updateEvent", eventData); }
    async function deleteEventOnServer(eventId) { return await apiCall("deleteEvent", { eventId }); }
    async function updateServiceNoteOnServer(eventId, written, date) { return await apiCall("updateServiceNote", { eventId, written, date }); }
    
    async function saveStudentOlympiadToServer(data) { return await apiCall("saveStudentOlympiad", data); }
    async function updateStudentOlympiadOnServer(data) { return await apiCall("updateStudentOlympiad", data); }
    async function deleteStudentOlympiadOnServer(id) { return await apiCall("deleteStudentOlympiad", { id }); }
    
    async function saveTeacherContestToServer(data) { return await apiCall("saveTeacherContest", data); }
    async function updateTeacherContestOnServer(data) { return await apiCall("updateTeacherContest", data); }
    async function deleteTeacherContestOnServer(id) { return await apiCall("deleteTeacherContest", { id }); }
    
    async function saveTeacherArticleToServer(data) { return await apiCall("saveTeacherArticle", data); }
    async function updateTeacherArticleOnServer(data) { return await apiCall("updateTeacherArticle", data); }
    async function deleteTeacherArticleOnServer(id) { return await apiCall("deleteTeacherArticle", { id }); }
    
    async function saveTeacherAchievementToServer(data) { return await apiCall("saveTeacherAchievement", data); }
    async function deleteTeacherAchievementOnServer(id) { return await apiCall("deleteTeacherAchievement", { id }); }
    
    async function addCCTeacherToServer(data) { return await apiCall("addCCTeacher", data); }
    async function updateCCTeacherOnServer(data) { return await apiCall("updateCCTeacher", data); }
    async function deleteCCTeacherOnServer(id) { return await apiCall("deleteCCTeacher", { id }); }
    
    async function addCycleCommissionToServer(data) { return await apiCall("addCycleCommission", data); }
    async function updateCycleCommissionOnServer(data) { return await apiCall("updateCycleCommission", data); }
    async function deleteCycleCommissionOnServer(id) { return await apiCall("deleteCycleCommission", { id }); }

    function sortByDate(items) {
        return [...items].sort((a, b) => {
            const dateA = a.date.split('.').reverse().join('-');
            const dateB = b.date.split('.').reverse().join('-');
            return dateA.localeCompare(dateB);
        });
    }

    function groupParticipantsBySupervisor(participants) {
        const groups = {};
        for (const p of participants) {
            const sup = p.supervisor || "—";
            if (!groups[sup]) groups[sup] = [];
            groups[sup].push(p);
        }
        return groups;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function getTeacherStats(events) {
        const stats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 };
        let total = 0;
        for (const ev of events) {
            for (const p of ev.participants) {
                stats[p.result] = (stats[p.result] || 0) + 1;
                total++;
            }
        }
        return { stats, total };
    }

    function render() {
        const app = document.getElementById('app');
        if (!currentUser) {
            app.innerHTML = renderLogin();
            attachLoginEvents();
        } else {
            app.innerHTML = renderMain();
            attachMainEvents();
        }
    }

    function renderLogin() {
        return `
            <div class="main-content" style="max-width: 450px; margin: 5rem auto;">
                <div class="panel" style="text-align: center;">
                    <div style="margin-bottom: 1.5rem;">
                        <h2 style="color: var(--primary);">Мониторинг мероприятий</h2>
                        <p style="color: var(--secondary);">Научно-методический отдел</p>
                        <p style="font-size: 0.85rem;">Альметьевский политехнический техникум</p>
                    </div>
                    <div class="form-group">
                        <label>Логин</label>
                        <input type="text" id="login" placeholder="Введите логин">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="password" placeholder="Введите пароль">
                    </div>
                    <button id="loginBtn" style="margin-top: 1rem; width: 100%;">🔑 ВОЙТИ</button>
                    <div style="margin-top: 1rem; font-size: 0.75rem; color: var(--secondary);">
                    </div>
                </div>
            </div>
        `;
    }

    function renderMain() {
        const role = currentUser.role;
        const isAdmin = role === 'admin';
        const isEditor = role === 'editor';
        const isChairman = role === 'chairman';
        
        let navHtml = `
            <div class="nav-buttons">
                <button class="nav-btn ${currentModule === 'student_contests' ? 'active' : ''}" data-module="student_contests">🎓 Студенты (конкурсы)</button>
                <button class="nav-btn ${currentModule === 'student_olympiads' ? 'active' : ''}" data-module="student_olympiads">🏅 Студенты (олимпиады)</button>
                <button class="nav-btn ${currentModule === 'teacher_contests' ? 'active' : ''}" data-module="teacher_contests">👨‍🏫 Преподаватели (конкурсы)</button>
                <button class="nav-btn ${currentModule === 'teacher_articles' ? 'active' : ''}" data-module="teacher_articles">📄 Преподаватели (статьи)</button>
                ${isChairman ? `<button class="nav-btn ${currentModule === 'mycc' ? 'active' : ''}" data-module="mycc">👥 Мой ЦК</button>` : ''}
                ${isAdmin ? `<button class="nav-btn ${currentModule === 'managecc' ? 'active' : ''}" data-module="managecc">⚙️ Управление ЦК</button>` : ''}
            </div>
        `;
        
        if (currentModule === 'student_contests') return renderStudentContests(navHtml, isAdmin, isEditor);
        if (currentModule === 'student_olympiads') return renderStudentOlympiads(navHtml, isAdmin, isEditor);
        if (currentModule === 'teacher_contests') return renderTeacherContests(navHtml, isAdmin, isEditor);
        if (currentModule === 'teacher_articles') return renderTeacherArticles(navHtml, isAdmin, isEditor);
        if (currentModule === 'mycc' && isChairman) return renderMyCC(navHtml);
        if (currentModule === 'managecc' && isAdmin) return renderManageCC(navHtml);
        
        return renderStudentContests(navHtml, isAdmin, isEditor);
    }

    function renderStudentContests(navHtml, isAdmin, isEditor) {
        const eventsForStatus = eventsData[currentStatus] || [];
        const sortedEvents = sortByDate(eventsForStatus);

        let totalStats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 };
        let totalParticipants = 0;
        let notesWritten = 0;
        let notesNotWritten = 0;

        for (const ev of sortedEvents) {
            for (const p of ev.participants) {
                totalStats[p.result] = (totalStats[p.result] || 0) + 1;
                totalParticipants++;
            }
            if (ev.service_note_written) notesWritten++;
            else notesNotWritten++;
        }

        const statsHtml = `
            <div class="stats">
                <div class="stats-grid">
                    <span>📊 Участие: ${totalStats["Участие"]}</span>
                    <span>🥇 1 место: ${totalStats["Диплом 1 место"]}</span>
                    <span>🥈 2 место: ${totalStats["Диплом 2 место"]}</span>
                    <span>🥉 3 место: ${totalStats["Диплом 3 место"]}</span>
                    <span>🏆 Номинации: ${totalStats["Номинация"]}</span>
                    <span>👥 Всего участников: ${totalParticipants}</span>
                </div>
                <div style="margin-top: 0.5rem;">📋 Служебные записки: ✅ написано ${notesWritten} | ❌ не написано ${notesNotWritten}</div>
            </div>
        `;

        let itemsHtml = '';
        for (let idx = 0; idx < sortedEvents.length; idx++) {
            const ev = sortedEvents[idx];
            const groups = groupParticipantsBySupervisor(ev.participants);
            let participantsHtml = '';
            for (const [sup, parts] of Object.entries(groups)) {
                participantsHtml += `<div class="participant-item"><strong>Руководитель: ${escapeHtml(sup)}</strong></div>`;
                for (const p of parts) {
                    participantsHtml += `<div class="participant-item">  • ${escapeHtml(p.full_name)} (гр.${escapeHtml(p.group)}) - ${p.result}</div>`;
                }
            }
            const noteStatus = ev.service_note_written 
                ? `<span class="service-note-written">✅ НАПИСАНА (${formatDate(ev.service_note_date)})</span>`
                : `<span class="service-note-missing">❌ НЕ НАПИСАНА</span>`;

            itemsHtml += `
                <div class="item-card" data-id="${ev.id}">
                    <div class="item-header">
                        <div class="item-number">№ ${idx+1}</div>
                        <div class="item-actions">
                            ${isAdmin ? `<button class="btn-edit" onclick="window.openEditEventModal(${ev.id})">✏️ Редактировать</button>` : ''}
                            ${isAdmin ? `<button class="btn-delete" onclick="window.deleteEventById(${ev.id})">🗑 Удалить</button>` : ''}
                        </div>
                    </div>
                    <div class="item-field"><span class="item-label">Наименование мероприятия:</span> ${escapeHtml(ev.name)}</div>
                    <div class="item-field"><span class="item-label">Статус:</span> ${ev.status}</div>
                    <div class="item-field"><span class="item-label">Организаторы:</span> ${escapeHtml(ev.organizers)}</div>
                    <div class="item-field"><span class="item-label">Число участников:</span> ${ev.participants_count}</div>
                    <div class="item-field"><span class="item-label">Дата проведения:</span> ${formatDate(ev.date)}</div>
                    <div class="item-field"><span class="item-label">Результат:</span> ${ev.participants[0]?.result || ''}</div>
                    <div class="service-note-status"><span class="item-label">Служебная записка:</span> ${noteStatus}</div>
                    <div class="item-field"><span class="item-label">Участники, группа:</span></div>
                    <div class="participant-list">${participantsHtml}</div>
                </div>
            `;
        }

        let adminFormHtml = '';
        if (isAdmin) {
            adminFormHtml = `
                <div class="panel">
                    <div class="panel-title">➕ СОЗДАНИЕ НОВОГО МЕРОПРИЯТИЯ</div>
                    <div class="form-group">
                        <label>Наименование мероприятия</label>
                        <textarea id="eventName" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Статус</label>
                        <select id="eventStatus">${STATUSES.map(s => `<option value="${s}">${s}</option>`).join('')}</select>
                    </div>
                    <div class="form-group">
                        <label>Организаторы</label>
                        <textarea id="eventOrganizers" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Дата проведения (ДД.ММ.ГГГГ)</label>
                        <input type="text" id="eventDate" placeholder="ДД.ММ.ГГГГ" value="${new Date().toLocaleDateString('ru-RU')}">
                    </div>
                    
                    <div class="panel-title" style="font-size: 0.9rem; margin-top: 1rem;">👥 ДОБАВЛЕНИЕ УЧАСТНИКОВ</div>
                    <div class="form-grid">
                        <div class="form-group"><label>ФИО участника</label><input type="text" id="participantName"></div>
                        <div class="form-group"><label>Группа</label><input type="text" id="participantGroup"></div>
                        <div class="form-group"><label>Руководитель(ли)</label><input type="text" id="participantSupervisor" placeholder="можно оставить пустым"></div>
                        <div class="form-group"><label>Результат</label><select id="participantResult">${RESULTS.map(r => `<option value="${r}">${r}</option>`).join('')}</select></div>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="addParticipantBtn">➕ Добавить участника</button>
                        <button id="clearParticipantsBtn" class="btn-secondary">🗑 Очистить список</button>
                    </div>
                    <div class="form-group" style="margin-top: 0.5rem;"><label>Добавленные участники:</label></div>
                    <div id="participantsList" style="border:1px solid var(--border); border-radius:8px; padding:0.5rem; min-height:80px; max-height:150px; overflow-y:auto; font-size:0.85rem;"></div>
                    <button id="saveEventBtn" style="margin-top: 1rem; width:100%;">💾 СОХРАНИТЬ МЕРОПРИЯТИЕ</button>
                    
                    <hr style="margin: 1rem 0;">
                    <div class="panel-title">👥 УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ</div>
                    <button id="manageUsersBtn" class="btn-secondary">👥 УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ</button>
                </div>
            `;
        }

        let editorButtons = '';
        if (isEditor) {
            editorButtons = `
                <button id="markServiceNoteBtn" style="background: #28a745;">✍️ Отметить служебную записку</button>
                <button id="generateServiceNoteBtn" style="background: #17a2b8;">📄 Сформировать служебную записку</button>
            `;
        }

        return `
            <div class="header">
                <div class="header-content">
                    <div class="logo">
                        <h1>МОНИТОРИНГ МЕРОПРИЯТИЙ 2025-2026</h1>
                        <p>Альметьевский политехнический техникум</p>
                    </div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(currentUser.name)}</div>
                        <div class="user-role">${isAdmin ? 'Администратор' : (isEditor ? 'Методист' : (isChairman ? 'Председатель ЦК' : 'Просмотр'))}</div>
                        <button class="btn-logout" id="logoutBtn">🚪 ВЫЙТИ</button>
                    </div>
                </div>
            </div>
            <div class="main-content">
                ${navHtml}
                <div class="status-buttons">
                    ${STATUSES.map(s => `<button class="status-btn ${currentStatus === s ? 'active' : ''}" data-status="${s}">${s}</button>`).join('')}
                </div>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem;">
                    ${editorButtons}
                    <button id="copyAllBtn">📋 Копировать всё</button>
                    <button id="copyStatsBtn">📊 Копировать статистику</button>
                    <button id="refreshBtn">🔄 Обновить</button>
                </div>
                <div class="panel">
                    <div class="panel-title">📋 Студенческие конкурсы (${currentStatus} уровень)</div>
                    <div class="items-list" id="itemsList">
                        ${itemsHtml || '<div style="padding: 2rem; text-align: center;">Нет данных</div>'}
                    </div>
                    ${statsHtml}
                </div>
                ${adminFormHtml}
            </div>
        `;
    }

    function renderStudentOlympiads(navHtml, isAdmin, isEditor) {
        const sortedOlympiads = sortByDate(studentOlympiads);
        
        let totalStats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 };
        let totalParticipants = 0;
        let notesWritten = 0;
        let notesNotWritten = 0;
        
        for (const o of sortedOlympiads) {
            for (const p of o.participants) {
                totalStats[p.result] = (totalStats[p.result] || 0) + 1;
                totalParticipants++;
            }
            if (o.service_note_written) notesWritten++;
            else notesNotWritten++;
        }
        
        const statsHtml = `
            <div class="stats">
                <div class="stats-grid">
                    <span>📊 Участие: ${totalStats["Участие"]}</span>
                    <span>🥇 1 место: ${totalStats["Диплом 1 место"]}</span>
                    <span>🥈 2 место: ${totalStats["Диплом 2 место"]}</span>
                    <span>🥉 3 место: ${totalStats["Диплом 3 место"]}</span>
                    <span>🏆 Номинации: ${totalStats["Номинация"]}</span>
                    <span>👥 Всего участников: ${totalParticipants}</span>
                </div>
                <div style="margin-top: 0.5rem;">📋 Служебные записки: ✅ написано ${notesWritten} | ❌ не написано ${notesNotWritten}</div>
            </div>
        `;
        
        let itemsHtml = '';
        for (let idx = 0; idx < sortedOlympiads.length; idx++) {
            const o = sortedOlympiads[idx];
            const groups = groupParticipantsBySupervisor(o.participants);
            let participantsHtml = '';
            for (const [sup, parts] of Object.entries(groups)) {
                participantsHtml += `<div class="participant-item"><strong>Руководитель: ${escapeHtml(sup)}</strong></div>`;
                for (const p of parts) {
                    participantsHtml += `<div class="participant-item">  • ${escapeHtml(p.full_name)} (гр.${escapeHtml(p.group)}) - ${p.result}</div>`;
                }
            }
            const noteStatus = o.service_note_written 
                ? `<span class="service-note-written">✅ НАПИСАНА (${formatDate(o.service_note_date)})</span>`
                : `<span class="service-note-missing">❌ НЕ НАПИСАНА</span>`;
            
            itemsHtml += `
                <div class="item-card" data-id="${o.id}">
                    <div class="item-header">
                        <div class="item-number">№ ${idx+1}</div>
                        <div class="item-actions">
                            ${isAdmin ? `<button class="btn-edit" onclick="window.openEditOlympiadModal(${o.id})">✏️ Редактировать</button>` : ''}
                            ${isAdmin ? `<button class="btn-delete" onclick="window.deleteOlympiadById(${o.id})">🗑 Удалить</button>` : ''}
                        </div>
                    </div>
                    <div class="item-field"><span class="item-label">Наименование олимпиады:</span> ${escapeHtml(o.name)}</div>
                    <div class="item-field"><span class="item-label">Статус:</span> ${o.status}</div>
                    <div class="item-field"><span class="item-label">Организаторы:</span> ${escapeHtml(o.organizers)}</div>
                    <div class="item-field"><span class="item-label">Число участников:</span> ${o.participants.length}</div>

    async function loadTeachersForCC(ccId) {
        const teachers = await loadCCTeachers(ccId);
        const container = document.getElementById('ccTeachersPanel');
        if (!container) return;
        
        if (teachers.length === 0) {
            container.innerHTML = '<div style="color: gray;">Нет преподавателей в этом ЦК</div>';
            return;
        }
        
        let html = '<div class="teachers-list">';
        for (const t of teachers) {
            html += `
                <div class="teacher-card" data-id="${t.id}">
                    <div class="teacher-name">${escapeHtml(t.teacher_name)}</div>
                    <div style="font-size: 0.8rem; color: var(--secondary);">ID: ${t.id} | Активен: ${t.active ? 'Да' : 'Нет'}</div>
                    <div style="margin-top: 0.5rem;">
                        <button class="btn-edit" onclick="editTeacher(${t.id}, '${escapeHtml(t.teacher_name)}', ${t.cc_id}, ${t.active})">✏️ Редактировать</button>
                        <button class="btn-delete" onclick="deleteTeacher(${t.id})">🗑 Удалить</button>
                        <button class="btn-secondary" onclick="viewTeacherAchievements(${t.id}, '${escapeHtml(t.teacher_name)}')">📊 Достижения</button>
                    </div>
                </div>
            `;
        }
        html += '</div>';
        container.innerHTML = html;
    }

    window.editTeacher = function(id, name, ccId, active) {
        const newName = prompt("Введите новое имя преподавателя:", name);
        if (!newName) return;
        const newActive = confirm("Активен ли преподаватель? Нажмите OK если Да, Отмена если Нет");
        
        updateCCTeacherOnServer({ id, teacher_name: newName, cc_id: ccId, active: newActive }).then(() => {
            const select = document.getElementById('ccSelect');
            if (select && select.value) {
                loadTeachersForCC(parseInt(select.value));
            }
            alert("Преподаватель обновлён!");
        });
    };

    window.deleteTeacher = function(id) {
        if (confirm("Удалить преподавателя?")) {
            deleteCCTeacherOnServer(id).then(() => {
                const select = document.getElementById('ccSelect');
                if (select && select.value) {
                    loadTeachersForCC(parseInt(select.value));
                }
                alert("Преподаватель удалён!");
            });
        }
    };

    function copyAllText() {
        let items = [];
        let title = '';
        
        if (currentModule === 'student_contests') {

            items = sortByDate(eventsForStatus);

        }
        
        if (items.length === 0) { alert('Нет данных для копирования'); return; }
        
        let text = title;
        for (let idx = 0; idx < items.length; idx++) {
            const item = items[idx];
            text += `========================================\n`;
            text += `№ ${idx+1}\n`;
            text += `Наименование: ${item.name}\n`;
            text += `Статус: ${item.status}\n`;
            if (item.organizers) text += `Организаторы: ${item.organizers}\n`;
            text += `Дата: ${formatDate(item.date)}\n`;
            if (item.participants) {
                text += `Участники:\n`;
                const groups = groupParticipantsBySupervisor(item.participants);
                for (const [sup, parts] of Object.entries(groups)) {
                    text += `   Руководитель: ${sup}\n`;
                    for (const p of parts) {
                        text += `      • ${p.full_name} (гр.${p.group}) - ${p.result}\n`;
                    }
                }
            }
            if (item.teacher_name) text += `Преподаватель: ${item.teacher_name}\n`;
            if (item.result) text += `Результат: ${item.result}\n`;
            text += `========================================\n\n`;
        }
        
        navigator.clipboard.writeText(text);
        alert('Данные скопированы в буфер обмена');
    }

    function copyStats() {
        let items = [];
        if (currentModule === 'student_contests') {
            items = eventsData[currentStatus] || [];
        } else if (currentModule === 'student_olympiads') {
            items = studentOlympiads.filter(o => o.status === currentStatus);
        } else if (currentModule === 'teacher_contests') {
            items = teacherContests.filter(c => c.status === currentStatus);
        } else if (currentModule === 'teacher_articles') {
            items = teacherArticles.filter(a => a.status === currentStatus);
        }
        
        const sorted = sortByDate(items);
        let totalStats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 };
        let totalParts = 0;
        
        for (const item of sorted) {
            if (item.participants) {
                for (const p of item.participants) {
                    totalStats[p.result] = (totalStats[p.result] || 0) + 1;
                    totalParts++;
                }
            } else {
                if (item.result) {
                    totalStats[item.result] = (totalStats[item.result] || 0) + 1;
                    totalParts++;
                }
            }
        }
        
        let text = `СТАТИСТИКА ПО ${currentStatus} УРОВНЮ\n`;
        text += `Участие: ${totalStats["Участие"]} | 1 место: ${totalStats["Диплом 1 место"]} | 2 место: ${totalStats["Диплом 2 место"]} | 3 место: ${totalStats["Диплом 3 место"]} | Номинации: ${totalStats["Номинация"]}\n`;
        text += `Всего записей: ${totalParts}\n`;
        navigator.clipboard.writeText(text);
        alert('Статистика скопирована');
    }

    async function openMarkNoteWindow() {
        const status = prompt("Выберите уровень мероприятия:\n" + STATUSES.join("\n"), currentStatus);
        if (!status || !STATUSES.includes(status)) {
            alert("Неверный уровень!");
            return;
        }
        
        const eventsList = eventsData[status] || [];
        if (eventsList.length === 0) {
            alert("Нет мероприятий в этом уровне!");
            return;
        }
        
        let eventOptions = "";
        for (let i = 0; i < eventsList.length; i++) {
            eventOptions += `${i+1}. ${eventsList[i].name} (${formatDate(eventsList[i].date)})\n`;
        }
        
        const eventNum = prompt(`Выберите мероприятие:\n${eventOptions}`, "1");
        if (!eventNum) return;
        
        const idx = parseInt(eventNum) - 1;
        if (idx < 0 || idx >= eventsList.length) {
            alert("Неверный номер!");
            return;
        }
        
        const event = eventsList[idx];
        let date = prompt("Дата написания служебной записки (ДД.ММ.ГГГГ):", new Date().toLocaleDateString('ru-RU'));
        if (!date) return;
        
        if (!/^\d{2}\.\d{2}\.\d{4}$/.test(date)) {
            try {
                let parsedDate = new Date(date);
                if (!isNaN(parsedDate.getTime())) {
                    let day = parsedDate.getDate().toString().padStart(2, '0');
                    let month = (parsedDate.getMonth() + 1).toString().padStart(2, '0');
                    let year = parsedDate.getFullYear();
                    date = `${day}.${month}.${year}`;
                }
            } catch(e) {}
        }
        
        await updateServiceNoteOnServer(event.id, true, date);
        eventsData = await loadEvents();
        render();
        alert(`Служебная записка отмечена! Дата: ${date}`);
    }

    function openMultiGenerateNoteWindow() {
        let allEvents = [];
        for (const status of STATUSES) {
            const events = eventsData[status] || [];
            for (const e of events) {
                allEvents.push({ ...e, status });
            }
        }
        allEvents = sortByDate(allEvents);
        
        let eventList = "";
        for (let i = 0; i < allEvents.length; i++) {
            eventList += `${i+1}. ${allEvents[i].name} (${allEvents[i].status}, ${formatDate(allEvents[i].date)})\n`;
        }
        
        const input = prompt(`Выберите номера мероприятий через запятую:\n\n${eventList}\n\nПример: 1,3,5`);
        if (!input) return;
        
        const numbers = input.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n > 0 && n <= allEvents.length);
        const selectedEvents = numbers.map(n => allEvents[n-1]);
        
        if (selectedEvents.length === 0) {
            alert("Не выбрано ни одного мероприятия!");
            return;
        }
        
        const noteNumber = prompt("№ служебной записки:", "01-03/2026") || "___";
        const today = new Date().toLocaleDateString('ru-RU');
        
        let allPrizeParticipants = [];
        for (const ev of selectedEvents) {
            const fullEvent = eventsData[ev.status]?.find(e => e.id === ev.id);
            if (!fullEvent) continue;
            const prizeParticipants = fullEvent.participants.filter(p => PRIZE_RESULTS.includes(p.result));
            if (prizeParticipants.length > 0) {
                allPrizeParticipants.push({ event: fullEvent, participants: prizeParticipants });
            }
        }
        
        if (allPrizeParticipants.length === 0) {
            alert("В выбранных мероприятиях нет призовых мест!");
            return;
        }
        
        let eventsText = '';
        for (const item of allPrizeParticipants) {
            const ev = item.event;
            const groups = groupParticipantsBySupervisor(item.participants);
            eventsText += `\n${'─'.repeat(70)}\n`;
            eventsText += `МЕРОПРИЯТИЕ: ${ev.name}\n`;
            eventsText += `Статус: ${ev.status}\n`;
            eventsText += `Дата проведения: ${formatDate(ev.date)}\n`;
            eventsText += `РЕЗУЛЬТАТЫ (призовые места):\n`;
            for (const [sup, parts] of Object.entries(groups)) {
                eventsText += `Руководитель: ${sup}\n`;
                for (const p of parts) {
                    eventsText += `  - ${p.full_name} (гр.${p.group}) — ${p.result}\n`;
                }
            }
        }
        
        const result = `
═══════════════════════════════════════════════════════════════
                    СЛУЖЕБНАЯ ЗАПИСКА № ${noteNumber}
═══════════════════════════════════════════════════════════════

Дата: ${today}

Настоящим сообщаю о результатах участия студентов 
Альметьевского политехнического техникума в следующих мероприятиях:
${eventsText}
${'═'.repeat(70)}

Итого по всем мероприятиям: ${allPrizeParticipants.reduce((sum, item) => sum + item.participants.length, 0)} призовых мест

═══════════════════════════════════════════════════════════════
Методист _________________ / Рахуба К.А. /
═══════════════════════════════════════════════════════════════
        `;
        
        navigator.clipboard.writeText(result);
        alert("Текст служебной записки скопирован в буфер обмена!");
    }

    async function openUserManagement() {
        const users = await loadUsers();
        let userList = "ТЕКУЩИЕ ПОЛЬЗОВАТЕЛИ:\n\n";
        for (const [login, data] of Object.entries(users)) {
            userList += `Логин: ${login} | Имя: ${data.name} | Роль: ${data.role} | ЦК ID: ${data.cc_id || '—'}\n`;
        }
        
        const action = prompt(`${userList}\n\nЧто сделать?\n1 - Добавить пользователя\n2 - Удалить пользователя\n3 - Назад`, "3");
        
        if (action === "1") {
            const newLogin = prompt("Логин:");
            if (!newLogin) return;
            const newPassword = prompt("Пароль:");
            if (!newPassword) return;
            const newName = prompt("Имя:");
            if (!newName) return;
            const newRole = prompt("Роль (admin/editor/viewer/chairman):", "viewer");
            let ccId = null;
            if (newRole === "chairman") {
                ccId = prompt("Введите ID ЦК (1-12):");
            }
            const result = await saveUserToServer({ login: newLogin, password: newPassword, name: newName, role: newRole, cc_id: ccId });
            if (result) {
                alert("Пользователь добавлен!");
                render();
            } else { alert("Ошибка при добавлении!"); }
        } else if (action === "2") {
            const deleteLogin = prompt("Введите логин пользователя для удаления:");
            if (!deleteLogin || deleteLogin === "muhanov") { alert("Нельзя удалить главного администратора!"); return; }
            const result = await deleteUserOnServer(deleteLogin);
            if (result) {
                alert("Пользователь удалён!");
                render();
            } else { alert("Ошибка при удалении!"); }
        }
    }
