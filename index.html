    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">

<body>
<div class="app-container" id="app"><div class="loader">Загрузка...</div></div>

<script>
const STATUSES = ["Республиканский", "Муниципальный (Городской)", "Федеральный", "Всероссийский", "Международный"];
const RESULTS = ["Участие", "Диплом 1 место", "Диплом 2 место", "Диплом 3 место", "Номинация"];
const PRIZE_RESULTS = ["Диплом 1 место", "Диплом 2 место", "Диплом 3 место", "Номинация"];

// ⚠️ ЗАМЕНИТЕ НА ВАШ URL
const API_URL = "https://script.google.com/macros/s/AKfycbwkXHHO4ctUCT3sV7k78Q62LS-23YBK07Sl52cpLN_zirGunsOqQhRICH0QRRL48yc/exec";

function formatDate(dateString) {
    if (!dateString) return "Дата не указана";
    if (/^\d{2}\.\d{2}\.\d{4}$/.test(dateString)) return dateString;
    if (typeof dateString === 'number' && dateString > 40000) {
        let date = new Date((dateString - 25569) * 86400000);
        return `${date.getDate().toString().padStart(2,'0')}.${(date.getMonth()+1).toString().padStart(2,'0')}.${date.getFullYear()}`;
    }
    try {
        let date = new Date(dateString);
        if (!isNaN(date.getTime())) {
            return `${date.getDate().toString().padStart(2,'0')}.${(date.getMonth()+1).toString().padStart(2,'0')}.${date.getFullYear()}`;
        }
    } catch(e) {}
    return dateString;
}

let currentUser = null;
let currentModule = "student_contests";
let currentStatus = STATUSES[0];
let eventsData = {};
let studentOlympiads = [];
let teacherContests = [];
let teacherArticles = [];
let commissions = [];
let ccTeachers = [];
let selectedTeacher = null;
let teacherEvents = [];
let teacherAchievements = [];
let teacherPersonalArticles = [];
let pendingParticipants = [];

async function apiCall(action, data = {}) {
    try {
        const url = `${API_URL}?action=${action}&data=${encodeURIComponent(JSON.stringify(data))}`;
        const response = await fetch(url);
        const result = await response.json();
        if (result.success) return result.data;
        console.error('API Error:', result.error);
        return null;
    } catch (err) {
        console.error('Network Error:', err);
        return null;
    }
}

async function loadUsers() {
    const users = await apiCall("getUsers");
    if (users) { localStorage.setItem("monitoring_users_cache", JSON.stringify(users)); return users; }
    const cached = localStorage.getItem("monitoring_users_cache");
    return cached ? JSON.parse(cached) : {};
}

async function loadEvents() {
    const events = await apiCall("getEvents");
    if (events) { localStorage.setItem("monitoring_events_cache", JSON.stringify(events)); return events; }
    const cached = localStorage.getItem("monitoring_events_cache");
    return cached ? JSON.parse(cached) : {};
}

async function loadStudentOlympiads() { return await apiCall("getStudentOlympiads") || []; }
async function loadTeacherContests() { return await apiCall("getTeacherContests") || []; }
async function loadTeacherArticles() { return await apiCall("getTeacherArticles") || []; }
async function loadCommissions() {
    const data = await apiCall("getCycleCommissions");
    if (data) { commissions = data.slice(1).map(row => ({ id: row[0], name: row[1], chairman_username: row[2], chairman_name: row[3] })); return commissions; }
    return [];
}
async function loadCCTeachers(ccId) { const data = await apiCall("getCCTeachers", { cc_id: ccId }); if (data) { ccTeachers = data; return ccTeachers; } return []; }
async function loadTeacherEvents(teacherName) { const data = await apiCall("getTeacherEventsFromMonitoring", { teacher_name: teacherName }); if (data) { teacherEvents = data; return teacherEvents; } return []; }
async function loadTeacherAchievements(teacherId) { const data = await apiCall("getTeacherAchievements", { teacher_id: teacherId }); if (data) { teacherAchievements = data; return teacherAchievements; } return []; }

async function saveEventToServer(eventData) { return await apiCall("saveEvent", eventData); }
async function updateEventOnServer(eventData) { return await apiCall("updateEvent", eventData); }
async function deleteEventOnServer(eventId) { return await apiCall("deleteEvent", { eventId }); }
async function updateServiceNoteOnServer(eventId, written, date) { return await apiCall("updateServiceNote", { eventId, written, date }); }
async function saveStudentOlympiadToServer(data) { return await apiCall("saveStudentOlympiad", data); }
async function updateStudentOlympiadOnServer(data) { return await apiCall("updateStudentOlympiad", data); }
async function deleteStudentOlympiadOnServer(id) { return await apiCall("deleteStudentOlympiad", { id }); }
async function saveTeacherContestToServer(data) { return await apiCall("saveTeacherContest", data); }
async function updateTeacherContestOnServer(data) { return await apiCall("updateTeacherContest", data); }
async function deleteTeacherContestOnServer(id) { return await apiCall("deleteTeacherContest", { id }); }
async function saveTeacherArticleToServer(data) { return await apiCall("saveTeacherArticle", data); }
async function updateTeacherArticleOnServer(data) { return await apiCall("updateTeacherArticle", data); }
async function deleteTeacherArticleOnServer(id) { return await apiCall("deleteTeacherArticle", { id }); }
async function saveTeacherAchievementToServer(data) { return await apiCall("saveTeacherAchievement", data); }
async function deleteTeacherAchievementOnServer(id) { return await apiCall("deleteTeacherAchievement", { id }); }
async function addCCTeacherToServer(data) { return await apiCall("addCCTeacher", data); }
async function updateCCTeacherOnServer(data) { return await apiCall("updateCCTeacher", data); }
async function deleteCCTeacherOnServer(id) { return await apiCall("deleteCCTeacher", { id }); }
async function addCycleCommissionToServer(data) { return await apiCall("addCycleCommission", data); }
async function saveUserToServer(data) { return await apiCall("saveUser", data); }
async function deleteUserOnServer(login) { return await apiCall("deleteUser", { login }); }

function sortByDate(items) { return [...items].sort((a, b) => a.date.split('.').reverse().join('-').localeCompare(b.date.split('.').reverse().join('-'))); }
function groupParticipantsBySupervisor(participants) { const groups = {}; for (const p of participants) { const sup = p.supervisor || "—"; if (!groups[sup]) groups[sup] = []; groups[sup].push(p); } return groups; }
function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
function getTeacherStats(events) { const stats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 }; let total = 0; for (const ev of events) for (const p of ev.participants) { stats[p.result]++; total++; } return { stats, total }; }

function render() { document.getElementById('app').innerHTML = !currentUser ? renderLogin() : renderMain(); if (!currentUser) attachLoginEvents(); else attachMainEvents(); }

function renderLogin() {
    return `<div class="main-content" style="max-width:450px;margin:5rem auto;"><div class="panel" style="text-align:center;"><div style="margin-bottom:1.5rem;"><h2 style="color:var(--primary);">Мониторинг мероприятий</h2><p style="color:var(--secondary);">Научно-методический отдел</p><p style="font-size:0.85rem;">Альметьевский политехнический техникум</p></div>
    <div class="form-group"><label>Логин</label><input type="text" id="login" placeholder="Введите логин"></div>
    <div class="form-group"><label>Пароль</label><input type="password" id="password" placeholder="Введите пароль"></div>
    <button id="loginBtn" style="margin-top:1rem;width:100%;">🔑 ВОЙТИ</button>
    <div style="margin-top:1rem;font-size:0.75rem;color:var(--secondary);"></div></div></div>`;
}

function renderMain() {
    const isAdmin = currentUser.role === 'admin';
    const isEditor = currentUser.role === 'editor';
    const isViewer = currentUser.role === 'viewer';
    const isChairman = currentUser.role === 'chairman';
    
    const navHtml = `<div class="nav-buttons">
        <button class="nav-btn ${currentModule === 'student_contests' ? 'active' : ''}" data-module="student_contests">🎓 Студенты (конкурсы)</button>
        <button class="nav-btn ${currentModule === 'student_olympiads' ? 'active' : ''}" data-module="student_olympiads">🏅 Студенты (олимпиады)</button>
        <button class="nav-btn ${currentModule === 'teacher_contests' ? 'active' : ''}" data-module="teacher_contests">👨‍🏫 Преподаватели (конкурсы)</button>
        <button class="nav-btn ${currentModule === 'teacher_articles' ? 'active' : ''}" data-module="teacher_articles">📄 Преподаватели (статьи)</button>
        ${isChairman ? `<button class="nav-btn ${currentModule === 'mycc' ? 'active' : ''}" data-module="mycc">👥 Мой ЦК</button>` : ''}
        ${isAdmin ? `<button class="nav-btn ${currentModule === 'managecc' ? 'active' : ''}" data-module="managecc">⚙️ Управление ЦК</button>` : ''}
    </div>`;
    
    if (currentModule === 'student_contests') return renderStudentContests(navHtml, isAdmin, isEditor, isViewer);
    if (currentModule === 'student_olympiads') return renderStudentOlympiads(navHtml, isAdmin, isEditor, isViewer);
    if (currentModule === 'teacher_contests') return renderTeacherContests(navHtml, isAdmin, isEditor, isViewer);
    if (currentModule === 'teacher_articles') return renderTeacherArticles(navHtml, isAdmin, isEditor, isViewer);
    if (currentModule === 'mycc' && isChairman) return renderMyCC(navHtml);
    if (currentModule === 'managecc' && isAdmin) return renderManageCC(navHtml);
    return renderStudentContests(navHtml, isAdmin, isEditor, isViewer);
}

function renderStudentContests(navHtml, isAdmin, isEditor, isViewer) {
    const events = sortByDate(eventsData[currentStatus] || []);
    let stats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 }, participants = 0, notesWritten = 0;
    for (const ev of events) { for (const p of ev.participants) { stats[p.result]++; participants++; } if (ev.service_note_written) notesWritten++; }
    let itemsHtml = '';
    for (let i = 0; i < events.length; i++) {
        const ev = events[i];
        let partsHtml = '';
        for (const [sup, parts] of Object.entries(groupParticipantsBySupervisor(ev.participants))) {
            partsHtml += `<div class="participant-item"><strong>Руководитель: ${escapeHtml(sup)}</strong></div>`;
            for (const p of parts) partsHtml += `<div class="participant-item">  • ${escapeHtml(p.full_name)} (гр.${escapeHtml(p.group)}) - ${p.result}</div>`;
        }
        itemsHtml += `<div class="item-card"><div class="item-header"><div class="item-number">№ ${i+1}</div><div class="item-actions">${(isAdmin || isEditor) ? `<button class="btn-edit" onclick="openEditEventModal(${ev.id})">✏️ Редактировать</button>` : ''}${isAdmin ? `<button class="btn-delete" onclick="deleteEventById(${ev.id})">🗑 Удалить</button>` : ''}</div></div>
        <div class="item-field"><span class="item-label">Наименование:</span> ${escapeHtml(ev.name)}</div>
        <div class="item-field"><span class="item-label">Статус:</span> ${ev.status}</div>
        <div class="item-field"><span class="item-label">Организаторы:</span> ${escapeHtml(ev.organizers)}</div>
        <div class="item-field"><span class="item-label">Дата:</span> ${formatDate(ev.date)}</div>
        <div class="service-note-status"><span class="item-label">Служ. записка:</span> ${ev.service_note_written ? `<span class="service-note-written">✅ НАПИСАНА (${formatDate(ev.service_note_date)})</span>` : `<span class="service-note-missing">❌ НЕ НАПИСАНА</span>`}</div>
        <div class="item-field"><span class="item-label">Участники:</span></div><div class="participant-list">${partsHtml}</div></div>`;
    }
    const adminForm = (isAdmin || isEditor) ? `<div class="panel"><div class="panel-title">➕ НОВОЕ МЕРОПРИЯТИЕ</div><div class="form-group"><label>Наименование</label><textarea id="eventName" rows="2"></textarea></div>
        <div class="form-group"><label>Статус</label><select id="eventStatus">${STATUSES.map(s => `<option value="${s}">${s}</option>`).join('')}</select></div>
        <div class="form-group"><label>Организаторы</label><textarea id="eventOrganizers" rows="2"></textarea></div>
        <div class="form-group"><label>Дата</label><input type="text" id="eventDate" value="${new Date().toLocaleDateString('ru-RU')}"></div>
        <div class="panel-title">👥 УЧАСТНИКИ</div><div class="form-grid"><div class="form-group"><label>ФИО</label><input type="text" id="participantName"></div>
        <div class="form-group"><label>Группа</label><input type="text" id="participantGroup"></div>
        <div class="form-group"><label>Руководитель</label><input type="text" id="participantSupervisor"></div>
        <div class="form-group"><label>Результат</label><select id="participantResult">${RESULTS.map(r => `<option value="${r}">${r}</option>`).join('')}</select></div></div>
        <div style="display:flex;gap:0.5rem;"><button id="addParticipantBtn">➕ Добавить</button><button id="clearParticipantsBtn" class="btn-secondary">🗑 Очистить</button></div>
        <div id="participantsList" style="border:1px solid var(--border);border-radius:8px;padding:0.5rem;min-height:80px;margin-top:0.5rem;"></div>
        <button id="saveEventBtn" style="margin-top:1rem;">💾 СОХРАНИТЬ</button>${isAdmin ? `<hr><button id="manageUsersBtn" class="btn-secondary">👥 УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ</button>` : ''}</div>` : '';
    
    const editorButtons = isEditor ? `<button id="markServiceNoteBtn">✍️ Отметить служебную записку</button><button id="generateServiceNoteBtn">📄 Сформировать служебную записку</button>` : '';
    
    return `<div class="header"><div class="header-content"><div class="logo"><h1>МОНИТОРИНГ МЕРОПРИЯТИЙ 2025-2026</h1><p>Альметьевский политехнический техникум</p></div><div class="user-info"><div class="user-name">${escapeHtml(currentUser.name)}</div><div class="user-role">${isAdmin ? 'Администратор' : (isEditor ? 'Методист' : (isChairman ? 'Председатель ЦК' : 'Просмотр'))}</div><button class="btn-logout" id="logoutBtn">🚪 ВЫЙТИ</button></div></div></div>
    <div class="main-content">${navHtml}<div class="status-buttons">${STATUSES.map(s => `<button class="status-btn ${currentStatus === s ? 'active' : ''}" data-status="${s}">${s}</button>`).join('')}</div>
    <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">${editorButtons}<button id="copyAllBtn">📋 Копировать всё</button><button id="copyStatsBtn">📊 Копировать статистику</button><button id="refreshBtn">🔄 Обновить</button></div>
    <div class="panel"><div class="panel-title">📋 Студенческие конкурсы (${currentStatus})</div><div class="items-list">${itemsHtml || '<div style="padding:2rem;text-align:center;">Нет данных</div>'}</div><div class="stats"><div class="stats-grid"><span>📊 Участие: ${stats["Участие"]}</span><span>🥇 1 место: ${stats["Диплом 1 место"]}</span><span>🥈 2 место: ${stats["Диплом 2 место"]}</span><span>🥉 3 место: ${stats["Диплом 3 место"]}</span><span>🏆 Номинации: ${stats["Номинация"]}</span><span>👥 Всего: ${participants}</span></div><div>📋 Служебные записки: ✅ ${notesWritten} | ❌ ${events.length - notesWritten}</div></div></div>${adminForm}</div>`;
}

    const olympiads = sortByDate(studentOlympiads);
    let stats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 }, totalParts = 0, notesWritten = 0;
    for (const o of olympiads) { for (const p of o.participants) { stats[p.result]++; totalParts++; } if (o.service_note_written) notesWritten++; }
    let itemsHtml = '';
    for (let i = 0; i < olympiads.length; i++) {
        const o = olympiads[i];
        let partsHtml = '';
        for (const [sup, parts] of Object.entries(groupParticipantsBySupervisor(o.participants))) {
            partsHtml += `<div class="participant-item"><strong>Руководитель: ${escapeHtml(sup)}</strong></div>`;
            for (const p of parts) partsHtml += `<div class="participant-item">  • ${escapeHtml(p.full_name)} (гр.${escapeHtml(p.group)}) - ${p.result}</div>`;

        <div class="item-field"><span class="item-label">Наименование:</span> ${escapeHtml(o.name)}</div><div class="item-field"><span class="item-label">Статус:</span> ${o.status}</div>
        <div class="item-field"><span class="item-label">Организаторы:</span> ${escapeHtml(o.organizers)}</div><div class="item-field"><span class="item-label">Дата:</span> ${formatDate(o.date)}</div>
        <div class="service-note-status"><span class="item-label">Служ. записка:</span> ${o.service_note_written ? `<span class="service-note-written">✅ НАПИСАНА (${formatDate(o.service_note_date)})</span>` : `<span class="service-note-missing">❌ НЕ НАПИСАНА</span>`}</div>
        <div class="item-field"><span class="item-label">Участники:</span></div><div class="participant-list">${partsHtml}</div></div>`;
    }
    const adminForm = (isAdmin || isEditor) ? `<div class="panel"><div class="panel-title">➕ НОВАЯ ОЛИМПИАДА</div><div class="form-group"><label>Наименование</label><textarea id="olympiadName" rows="2"></textarea></div>

        <div class="form-group"><label>Группа</label><input type="text" id="olympiadParticipantGroup"></div>
        <div class="form-group"><label>Руководитель</label><input type="text" id="olympiadParticipantSupervisor"></div>
        <div class="form-group"><label>Результат</label><select id="olympiadParticipantResult">${RESULTS.map(r => `<option value="${r}">${r}</option>`).join('')}</select></div></div>
        <div style="display:flex;gap:0.5rem;"><button id="addOlympiadParticipantBtn">➕ Добавить</button><button id="clearOlympiadParticipantsBtn" class="btn-secondary">🗑 Очистить</button></div>
        <div id="olympiadParticipantsList" style="border:1px solid var(--border);border-radius:8px;padding:0.5rem;min-height:80px;margin-top:0.5rem;"></div>
        <button id="saveOlympiadBtn">💾 СОХРАНИТЬ</button></div>` : '';
    
    const editorButtons = isEditor ? `<button id="markServiceNoteOlympiadBtn">✍️ Отметить служебную записку</button>` : '';
    
    return `<div class="header"><div class="header-content"><div class="logo"><h1>МОНИТОРИНГ МЕРОПРИЯТИЙ 2025-2026</h1><p>Альметьевский политехнический техникум</p></div><div class="user-info"><div class="user-name">${escapeHtml(currentUser.name)}</div><div class="user-role">${isAdmin ? 'Администратор' : (isEditor ? 'Методист' : (isChairman ? 'Председатель ЦК' : 'Просмотр'))}</div><button class="btn-logout" id="logoutBtn">🚪 ВЫЙТИ</button></div></div></div>
    <div class="main-content">${navHtml}<div class="status-buttons">${STATUSES.map(s => `<button class="status-btn ${currentStatus === s ? 'active' : ''}" data-status="${s}">${s}</button>`).join('')}</div>
    <div style="display:flex;gap:0.5rem;margin-bottom:1rem;">${editorButtons}<button id="copyAllBtn">📋 Копировать всё</button><button id="copyStatsBtn">📊 Копировать статистику</button><button id="refreshBtn">🔄 Обновить</button></div>

function renderTeacherContests(navHtml, isAdmin, isEditor, isViewer) {
    const contests = sortByDate(teacherContests.filter(c => c.status === currentStatus));
    let stats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 };
    for (const c of contests) stats[c.result]++;
    let itemsHtml = '';
    for (let i = 0; i < contests.length; i++) {
        const c = contests[i];
        itemsHtml += `<div class="item-card"><div class="item-header"><div class="item-number">№ ${i+1}</div><div class="item-actions">${(isAdmin || isEditor) ? `<button class="btn-edit" onclick="openEditTeacherContestModal(${c.id})">✏️ Редактировать</button>` : ''}${isAdmin ? `<button class="btn-delete" onclick="deleteTeacherContestById(${c.id})">🗑 Удалить</button>` : ''}</div></div>

function attachLoginEvents() {
    document.getElementById('loginBtn').onclick = async () => {
        const login = document.getElementById('login').value.trim().toLowerCase();
        const password = document.getElementById('password').value.trim();
        const users = await loadUsers();
        if (users[login] && users[login].password === password) {
            currentUser = { ...users[login], username: login };
            eventsData = await loadEvents();
            studentOlympiads = await loadStudentOlympiads();
            teacherContests = await loadTeacherContests();
            teacherArticles = await loadTeacherArticles();
            await loadCommissions();
            if (currentUser.role === 'chairman' && currentUser.cc_id) await loadCCTeachers(currentUser.cc_id);
            render();
        } else alert('Неверный логин или пароль!');
    };
}

function copyAllText() {
    let items = [], title = '';
    if (currentModule === 'student_contests') { items = sortByDate(eventsData[currentStatus] || []); title = `СТУДЕНТЫ - КОНКУРСЫ\n${currentStatus}\n\n`; }
    else if (currentModule === 'student_olympiads') { items = sortByDate(studentOlympiads.filter(o => o.status === currentStatus)); title = `СТУДЕНТЫ - ОЛИМПИАДЫ\n${currentStatus}\n\n`; }
    else if (currentModule === 'teacher_contests') { items = sortByDate(teacherContests.filter(c => c.status === currentStatus)); title = `ПРЕПОДАВАТЕЛИ - КОНКУРСЫ\n${currentStatus}\n\n`; }
    else if (currentModule === 'teacher_articles') { items = sortByDate(teacherArticles.filter(a => a.status === currentStatus)); title = `ПРЕПОДАВАТЕЛИ - СТАТЬИ\n${currentStatus}\n\n`; }
    if (!items.length) { alert('Нет данных'); return; }
    let text = title;
    for (let i = 0; i < items.length; i++) {
        const it = items[i];
        text += `========================================\n№ ${i+1}\nНаименование: ${it.name}\nСтатус: ${it.status}\nДата: ${formatDate(it.date)}\n`;
        if (it.organizers) text += `Организаторы: ${it.organizers}\n`;
        if (it.participants) { text += `Участники:\n`; for (const [sup, parts] of Object.entries(groupParticipantsBySupervisor(it.participants))) { text += `   Руководитель: ${sup}\n`; for (const p of parts) text += `      • ${p.full_name} (гр.${p.group}) - ${p.result}\n`; } }
        if (it.teacher_name) text += `Преподаватель: ${it.teacher_name}\n`;
        if (it.result) text += `Результат: ${it.result}\n`;
        text += `========================================\n\n`;
    }
    navigator.clipboard.writeText(text);
    alert('Скопировано!');
}

function copyStats() {
    let items = [];
    if (currentModule === 'student_contests') items = eventsData[currentStatus] || [];
    else if (currentModule === 'student_olympiads') items = studentOlympiads.filter(o => o.status === currentStatus);
    else if (currentModule === 'teacher_contests') items = teacherContests.filter(c => c.status === currentStatus);
    else if (currentModule === 'teacher_articles') items = teacherArticles.filter(a => a.status === currentStatus);
    let stats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 }, total = 0;
    for (const it of items) { if (it.participants) for (const p of it.participants) { stats[p.result]++; total++; } else if (it.result) { stats[it.result]++; total++; } }
    const text = `СТАТИСТИКА ПО ${currentStatus}\nУчастие: ${stats["Участие"]} | 1 место: ${stats["Диплом 1 место"]} | 2 место: ${stats["Диплом 2 место"]} | 3 место: ${stats["Диплом 3 место"]} | Номинации: ${stats["Номинация"]}\nВсего: ${total}`;
    navigator.clipboard.writeText(text);
    alert('Статистика скопирована');
}

async function openMarkNoteWindow() {
    const status = prompt("Уровень:\n" + STATUSES.join("\n"), currentStatus);
    if (!status || !STATUSES.includes(status)) { alert("Неверный уровень!"); return; }
    const list = eventsData[status] || [];
    if (!list.length) { alert("Нет мероприятий!"); return; }
    let opts = ""; for (let i=0;i<list.length;i++) opts += `${i+1}. ${list[i].name} (${formatDate(list[i].date)})\n`;
    const num = prompt(`Выберите:\n${opts}`, "1");
    if (!num) return;
    const idx = parseInt(num)-1;
    if (idx<0 || idx>=list.length) { alert("Неверный номер!"); return; }
    const ev = list[idx];
    let date = prompt("Дата записки (ДД.ММ.ГГГГ):", new Date().toLocaleDateString('ru-RU'));
    if (!date) return;
    if (!/^\d{2}\.\d{2}\.\d{4}$/.test(date)) { try { let d = new Date(date); if (!isNaN(d.getTime())) date = `${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}.${d.getFullYear()}`; } catch(e){} }
    await updateServiceNoteOnServer(ev.id, true, date);
    eventsData = await loadEvents();
    render();
    alert(`Отмечено! Дата: ${date}`);
}

function openMultiGenerateNoteWindow() {
    let all = []; for (const s of STATUSES) for (const e of eventsData[s] || []) all.push({ ...e, status: s });
    all = sortByDate(all);
    let list = ""; for (let i=0;i<all.length;i++) list += `${i+1}. ${all[i].name} (${all[i].status}, ${formatDate(all[i].date)})\n`;
    const input = prompt(`Выберите номера через запятую:\n${list}`, "1");
    if (!input) return;
    const nums = input.split(",").map(n=>parseInt(n.trim())).filter(n=>!isNaN(n)&&n>0&&n<=all.length);
    const selected = nums.map(n=>all[n-1]);
    if (!selected.length) { alert("Не выбрано!"); return; }
    const noteNum = prompt("№ служебной записки:", "01-03/2026") || "___";
    const today = new Date().toLocaleDateString('ru-RU');
    let allPrize = [];
    for (const ev of selected) { const full = eventsData[ev.status]?.find(e=>e.id===ev.id); if (full) { const prize = full.participants.filter(p=>PRIZE_RESULTS.includes(p.result)); if (prize.length) allPrize.push({ event: full, participants: prize }); } }
    if (!allPrize.length) { alert("Нет призовых мест!"); return; }
    let eventsText = '';
    for (const item of allPrize) { const ev = item.event; const groups = groupParticipantsBySupervisor(item.participants); eventsText += `\n${'─'.repeat(70)}\nМЕРОПРИЯТИЕ: ${ev.name}\nСтатус: ${ev.status}\nДата: ${formatDate(ev.date)}\nРЕЗУЛЬТАТЫ:\n`; for (const [sup, parts] of Object.entries(groups)) { eventsText += `Руководитель: ${sup}\n`; for (const p of parts) eventsText += `  - ${p.full_name} (гр.${p.group}) — ${p.result}\n`; } }
    const result = `═══════════════════════════════════════════════════════════════\nСЛУЖЕБНАЯ ЗАПИСКА № ${noteNum}\n═══════════════════════════════════════════════════════════════\nДата: ${today}\n\nНастоящим сообщаю о результатах участия студентов:\n${eventsText}\n${'═'.repeat(70)}\nИтого призовых: ${allPrize.reduce((s,i)=>s+i.participants.length,0)}\n═══════════════════════════════════════════════════════════════\nМетодист _________________ / Рахуба К.А. /\n═══════════════════════════════════════════════════════════════`;
    navigator.clipboard.writeText(result);
    alert("Служебная записка скопирована!");
}

        if (users[login]) { alert("Уже существует!"); return; }
        const pwd = prompt("Пароль:"); if (!pwd) return;
        const name = prompt("Имя:"); if (!name) return;
        const role = prompt("Роль (admin/editor/viewer/chairman):", "viewer"); if (!role || !["admin","editor","viewer","chairman"].includes(role)) { alert("Неверная роль!"); return; }
        let cc = null; if (role === "chairman") { cc = prompt("ID ЦК (1-12):"); if (!cc || isNaN(parseInt(cc))) { alert("Неверный ID!"); return; } cc = parseInt(cc); }
        if (await saveUserToServer({ login: login.toLowerCase(), password: pwd, name, role: role.toLowerCase(), cc_id: cc })) { alert("Добавлен!"); localStorage.removeItem("monitoring_users_cache"); render(); } else alert("Ошибка!");
    } else if (action === "2") {
        const login = prompt("Логин для удаления:"); if (!login) return;
        if (login === "muhanov") { alert("Нельзя удалить админа!"); return; }
        if (!users[login]) { alert("Не найден!"); return; }
        if (confirm(`Удалить ${login}?`)) { if (await deleteUserOnServer(login)) { alert("Удален!"); localStorage.removeItem("monitoring_users_cache"); render(); } else alert("Ошибка!"); }
    }
}

(async function init() {
    eventsData = await loadEvents();
    studentOlympiads = await loadStudentOlympiads();
    teacherContests = await loadTeacherContests();
    teacherArticles = await loadTeacherArticles();
    await loadCommissions();
    render();
})();
</script>
