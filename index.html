<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Мониторинг мероприятий - Альметьевский политехнический техникум</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect x='10' y='50' width='15' height='40' fill='%23004d73'/%3E%3Crect x='35' y='30' width='15' height='60' fill='%23004d73'/%3E%3Crect x='60' y='10' width='15' height='80' fill='%23004d73'/%3E%3Crect x='85' y='40' width='15' height='50' fill='%23004d73'/%3E%3C/svg%3E">
</head>
<body>
<div class="app-container" id="app">
    <div class="loader">Загрузка...</div>
</div>

<script>
    const STATUSES = ["Республиканский", "Муниципальный (Городской)", "Федеральный", "Всероссийский", "Международный"];
    const RESULTS = ["Участие", "Диплом 1 место", "Диплом 2 место", "Диплом 3 место", "Номинация"];
    const PRIZE_RESULTS = ["Диплом 1 место", "Диплом 2 место", "Диплом 3 место", "Номинация"];

    // ========== ВСТАВЬТЕ ВАШ URL ==========
    const API_URL = "https://script.google.com/macros/s/ВАШ_URL/exec";

    // ========== ФОРМАТИРОВАНИЕ ДАТЫ ==========
    function formatDate(dateString) {
        if (!dateString) return "Дата не указана";
        if (/^\d{2}\.\d{2}\.\d{4}$/.test(dateString)) return dateString;
        if (typeof dateString === 'number' && dateString > 40000) {
            let date = new Date((dateString - 25569) * 86400000);
            let day = date.getDate().toString().padStart(2, '0');
            let month = (date.getMonth() + 1).toString().padStart(2, '0');
            let year = date.getFullYear();
            return `${day}.${month}.${year}`;
        }
        try {
            let date = new Date(dateString);
            if (!isNaN(date.getTime())) {
                let day = date.getDate().toString().padStart(2, '0');
                let month = (date.getMonth() + 1).toString().padStart(2, '0');
                let year = date.getFullYear();
                return `${day}.${month}.${year}`;
            }
        } catch(e) {}
        return dateString;
    }

    function toRussianDate(dateInput) {
        if (!dateInput) return "";
        if (/^\d{2}\.\d{2}\.\d{4}$/.test(dateInput)) return dateInput;
        try {
            let d = new Date(dateInput);
            if (!isNaN(d.getTime())) {
                let day = d.getDate().toString().padStart(2, '0');
                let month = (d.getMonth() + 1).toString().padStart(2, '0');
                let year = d.getFullYear();
                return `${day}.${month}.${year}`;
            }
        } catch(e) {}
        return dateInput;
    }

    let currentUser = null;
    let currentStatus = STATUSES[0];
    let eventsData = {};
    let pendingParticipants = [];

    async function apiCall(action, data = {}) {
        try {
            const url = `${API_URL}?action=${action}&data=${encodeURIComponent(JSON.stringify(data))}`;
            const response = await fetch(url);
            const result = await response.json();
            if (result.success) return result.data;
            console.error('API Error:', result.error);
            return null;
        } catch (err) {
            console.error('Network Error:', err);
            return null;
        }
    }

    async function loadUsers() {
        const users = await apiCall("getUsers");
        if (users) {
            localStorage.setItem("monitoring_users_cache", JSON.stringify(users));
            return users;
        }
        const cached = localStorage.getItem("monitoring_users_cache");
        return cached ? JSON.parse(cached) : {};
    }

    async function loadEvents() {
        const events = await apiCall("getEvents");
        if (events) {
            localStorage.setItem("monitoring_events_cache", JSON.stringify(events));
            return events;
        }
        const cached = localStorage.getItem("monitoring_events_cache");
        return cached ? JSON.parse(cached) : {};
    }

    async function saveEventToServer(eventData) { return await apiCall("saveEvent", eventData); }
    async function updateEventOnServer(eventData) { return await apiCall("updateEvent", eventData); }
    async function deleteEventOnServer(eventId) { return await apiCall("deleteEvent", { eventId }); }
    async function updateServiceNoteOnServer(eventId, written, date) { 
        const formattedDate = toRussianDate(date);
        return await apiCall("updateServiceNote", { eventId, written, date: formattedDate }); 
    }
    async function saveUserToServer(userData) { return await apiCall("saveUser", userData); }
    async function deleteUserOnServer(login) { return await apiCall("deleteUser", { login }); }

    function sortEventsByDate(events) {
        return [...events].sort((a, b) => {
            const dateA = a.date.split('.').reverse().join('-');
            const dateB = b.date.split('.').reverse().join('-');
            return dateA.localeCompare(dateB);
        });
    }

    function groupParticipantsBySupervisor(participants) {
        const groups = {};
        for (const p of participants) {
            const sup = p.supervisor || "—";
            if (!groups[sup]) groups[sup] = [];
            groups[sup].push(p);
        }
        return groups;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function render() {
        const app = document.getElementById('app');
        if (!currentUser) {
            app.innerHTML = renderLogin();
            attachLoginEvents();
        } else {
            app.innerHTML = renderMain();
            attachMainEvents();
        }
    }

    function renderLogin() {
        return `
            <div class="main-content" style="max-width: 450px; margin: 5rem auto;">
                <div class="panel" style="text-align: center;">
                    <div style="margin-bottom: 1.5rem;">
                        <h2 style="color: var(--primary);">Мониторинг мероприятий</h2>
                        <p style="color: var(--secondary);">Научно-методический отдел</p>
                        <p style="font-size: 0.85rem;">Альметьевский политехнический техникум</p>
                    </div>
                    <div class="form-group">
                        <label>Логин</label>
                        <input type="text" id="login" placeholder="Введите логин">
                    </div>
                    <div class="form-group">
                        <label>Пароль</label>
                        <input type="password" id="password" placeholder="Введите пароль">
                    </div>
                    <button id="loginBtn" style="margin-top: 1rem; width: 100%;">🔑 ВОЙТИ</button>
                    <div style="margin-top: 1rem; font-size: 0.75rem; color: var(--secondary);">
                    </div>
                </div>
            </div>
        `;
    }

    function renderMain() {
        const role = currentUser.role;
        const isAdmin = role === 'admin';
        const isEditor = role === 'editor';
        
        const eventsForStatus = eventsData[currentStatus] || [];
        const sortedEvents = sortEventsByDate(eventsForStatus);

        let totalStats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 };
        let totalParticipants = 0;
        let notesWritten = 0;
        let notesNotWritten = 0;

        for (const ev of sortedEvents) {
            for (const p of ev.participants) {
                totalStats[p.result] = (totalStats[p.result] || 0) + 1;
                totalParticipants++;
            }
            if (ev.service_note_written) notesWritten++;
            else notesNotWritten++;
        }

        const statsHtml = `
            <div class="stats">
                <div class="stats-grid">
                    <span>📊 Участие: ${totalStats["Участие"]}</span>
                    <span>🥇 1 место: ${totalStats["Диплом 1 место"]}</span>
                    <span>🥈 2 место: ${totalStats["Диплом 2 место"]}</span>
                    <span>🥉 3 место: ${totalStats["Диплом 3 место"]}</span>
                    <span>🏆 Номинации: ${totalStats["Номинация"]}</span>
                    <span>👥 Всего участников: ${totalParticipants}</span>
                </div>
                <div style="margin-top: 0.5rem;">📋 Служебные записки: ✅ написано ${notesWritten} | ❌ не написано ${notesNotWritten}</div>
            </div>
        `;

        let eventsHtml = '';
        for (let idx = 0; idx < sortedEvents.length; idx++) {
            const ev = sortedEvents[idx];
            const groups = groupParticipantsBySupervisor(ev.participants);
            let participantsHtml = '';
            for (const [sup, parts] of Object.entries(groups)) {
                participantsHtml += `<div class="participant-item"><strong>Руководитель: ${escapeHtml(sup)}</strong></div>`;
                for (const p of parts) {
                    participantsHtml += `<div class="participant-item">  • ${escapeHtml(p.full_name)} (гр.${escapeHtml(p.group)}) - ${p.result}</div>`;
                }
            }
            const noteStatus = ev.service_note_written 
                ? `<span class="service-note-written">✅ НАПИСАНА (${formatDate(ev.service_note_date)})</span>`
                : `<span class="service-note-missing">❌ НЕ НАПИСАНА</span>`;

            eventsHtml += `
                <div class="event-card" data-id="${ev.id}">
                    <div class="event-header">
                        <div class="event-number">№ ${idx+1}</div>
                        <div class="event-actions">
                            ${isAdmin ? `<button class="btn-edit" onclick="window.openEditEventModal(${ev.id})">✏️ Редактировать</button>` : ''}
                            ${isAdmin ? `<button class="btn-delete" onclick="window.deleteEventById(${ev.id})">🗑 Удалить</button>` : ''}
                        </div>
                    </div>
                    <div class="event-field"><span class="event-label">Наименование мероприятия:</span> ${escapeHtml(ev.name)}</div>
                    <div class="event-field"><span class="event-label">Статус:</span> ${ev.status}</div>
                    <div class="event-field"><span class="event-label">Организаторы:</span> ${escapeHtml(ev.organizers)}</div>
                    <div class="event-field"><span class="event-label">Число участников:</span> ${ev.participants_count}</div>
                    <div class="event-field"><span class="event-label">Дата проведения:</span> ${formatDate(ev.date)}</div>
                    <div class="event-field"><span class="event-label">Результат:</span> ${ev.participants[0]?.result || ''}</div>
                    <div class="service-note-status"><span class="event-label">Служебная записка:</span> ${noteStatus}</div>
                    <div class="event-field"><span class="event-label">Участники, группа:</span></div>
                    <div class="participant-list">${participantsHtml}</div>
                </div>
            `;
        }

        let adminFormHtml = '';
        if (isAdmin) {
            adminFormHtml = `
                <div class="panel">
                    <div class="panel-title">➕ СОЗДАНИЕ НОВОГО МЕРОПРИЯТИЯ</div>
                    <div class="form-group">
                        <label>Наименование мероприятия</label>
                        <textarea id="eventName" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Статус</label>
                        <select id="eventStatus">${STATUSES.map(s => `<option value="${s}">${s}</option>`).join('')}</select>
                    </div>
                    <div class="form-group">
                        <label>Организаторы</label>
                        <textarea id="eventOrganizers" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Дата проведения (ДД.ММ.ГГГГ)</label>
                        <input type="text" id="eventDate" placeholder="ДД.ММ.ГГГГ" value="${new Date().toLocaleDateString('ru-RU')}">
                    </div>
                    
                    <div class="panel-title" style="font-size: 0.9rem; margin-top: 1rem;">👥 ДОБАВЛЕНИЕ УЧАСТНИКОВ</div>
                    <div class="form-grid">
                        <div class="form-group"><label>ФИО участника</label><input type="text" id="participantName"></div>
                        <div class="form-group"><label>Группа</label><input type="text" id="participantGroup"></div>
                        <div class="form-group"><label>Руководитель(ли)</label><input type="text" id="participantSupervisor" placeholder="можно оставить пустым"></div>
                        <div class="form-group"><label>Результат</label><select id="participantResult">${RESULTS.map(r => `<option value="${r}">${r}</option>`).join('')}</select></div>
                    </div>
                    <div style="display: flex; gap: 0.5rem;">
                        <button id="addParticipantBtn">➕ Добавить участника</button>
                        <button id="clearParticipantsBtn" class="btn-secondary">🗑 Очистить список</button>
                    </div>
                    <div class="form-group" style="margin-top: 0.5rem;"><label>Добавленные участники:</label></div>
                    <div id="participantsList" style="border:1px solid var(--border); border-radius:8px; padding:0.5rem; min-height:80px; max-height:150px; overflow-y:auto; font-size:0.85rem;"></div>
                    <button id="saveEventBtn" style="margin-top: 1rem; width:100%;">💾 СОХРАНИТЬ МЕРОПРИЯТИЕ</button>
                    
                    <hr style="margin: 1rem 0;">
                    <div class="panel-title">👥 УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ</div>
                    <button id="manageUsersBtn" class="btn-secondary">👥 УПРАВЛЕНИЕ ПОЛЬЗОВАТЕЛЯМИ</button>
                </div>
            `;
        }

        let editorButtons = '';
        if (isEditor) {
            editorButtons = `
                <button id="markServiceNoteBtn" style="background: #28a745;">✍️ Отметить служебную записку</button>
                <button id="generateServiceNoteBtn" style="background: #17a2b8;">📄 Сформировать служебную записку</button>
            `;
        }

        return `
            <div class="header">
                <div class="header-content">
                    <div class="logo">
                        <h1>УЧАСТНИКИ МЕРОПРИЯТИЙ 2025-2026</h1>
                        <p>Альметьевский политехнический техникум</p>
                    </div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(currentUser.name)}</div>
                        <div class="user-role">${isAdmin ? 'Администратор' : (isEditor ? 'Методист' : 'Просмотр')}</div>
                        <button class="btn-logout" id="logoutBtn">🚪 ВЫЙТИ</button>
                    </div>
                </div>
            </div>
            <div class="main-content">
                <div class="status-buttons">
                    ${STATUSES.map(s => `<button class="status-btn ${currentStatus === s ? 'active' : ''}" data-status="${s}">${s}</button>`).join('')}
                </div>
                <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem;">
                    ${editorButtons}
                    <button id="copyAllBtn">📋 Копировать всё</button>
                    <button id="copyStatsBtn">📊 Копировать статистику</button>
                    <button id="refreshBtn">🔄 Обновить</button>
                </div>
                <div class="panel">
                    <div class="panel-title">📋 Мероприятия (${currentStatus} уровень)</div>
                    <div class="events-list" id="eventsList">
                        ${eventsHtml || '<div style="padding: 2rem; text-align: center;">Нет данных</div>'}
                    </div>
                    ${statsHtml}
                </div>
                ${adminFormHtml}
            </div>
        `;
    }

    // ========== ГЛОБАЛЬНАЯ ФУНКЦИЯ УДАЛЕНИЯ ==========
    window.deleteEventById = async function(eventId) {
        let event = null;
        for (const status of STATUSES) {
            event = eventsData[status]?.find(e => e.id === eventId);
            if (event) break;
        }
        if (!event) return;
        
        const password = prompt(`⚠️ Удаление мероприятия\n\nМероприятие: ${event.name}\nДата: ${formatDate(event.date)}\n\nВведите пароль администратора для подтверждения:`);
        if (!password) return;
        
        const users = await loadUsers();
        if (users['muhanov'] && users['muhanov'].password === password) {
            if (confirm(`Вы действительно хотите удалить мероприятие?\n\n${event.name}\n\nЭто действие НЕОБРАТИМО!`)) {
                const result = await deleteEventOnServer(eventId);
                if (result) {
                    eventsData = await loadEvents();
                    render();
                    alert('✅ Мероприятие успешно удалено!');
                } else {
                    alert('❌ Ошибка при удалении!');
                }
            }
        } else {
            alert('❌ Неверный пароль администратора!');
        }
    };

    // ========== ГЛОБАЛЬНАЯ ФУНКЦИЯ РЕДАКТИРОВАНИЯ ==========
    window.openEditEventModal = async function(eventId) {
        let event = null;
        for (const status of STATUSES) {
            event = eventsData[status]?.find(e => e.id === eventId);
            if (event) break;
        }
        if (!event) return;
        
        const modalHtml = `
            <div class="modal" id="editModal" style="display: flex;">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>✏️ Редактирование мероприятия</h3>
                        <span class="close-modal" onclick="document.getElementById('editModal')?.remove()">&times;</span>
                    </div>
                    <div class="form-group">
                        <label>Наименование мероприятия</label>
                        <textarea id="editEventName" rows="2">${escapeHtml(event.name)}</textarea>
                    </div>
                    <div class="form-group">
                        <label>Статус</label>
                        <select id="editEventStatus">${STATUSES.map(s => `<option value="${s}" ${event.status === s ? 'selected' : ''}>${s}</option>`).join('')}</select>
                    </div>
                    <div class="form-group">
                        <label>Организаторы</label>
                        <textarea id="editEventOrganizers" rows="2">${escapeHtml(event.organizers)}</textarea>
                    </div>
                    <div class="form-group">
                        <label>Дата проведения (ДД.ММ.ГГГГ)</label>
                        <input type="text" id="editEventDate" value="${formatDate(event.date)}">
                    </div>
                    
                    <div class="panel-title" style="font-size: 1rem; margin-top: 1rem;">👥 УЧАСТНИКИ</div>
                    <div id="editParticipantsList">
                        ${event.participants.map((p, idx) => `
                            <div class="participant-row" data-idx="${idx}">
                                <input type="text" class="edit-participant-name" value="${escapeHtml(p.full_name)}" placeholder="ФИО" style="flex:2">
                                <input type="text" class="edit-participant-group" value="${escapeHtml(p.group)}" placeholder="Группа" style="flex:1">
                                <input type="text" class="edit-participant-supervisor" value="${escapeHtml(p.supervisor)}" placeholder="Руководитель" style="flex:2">
                                <select class="edit-participant-result" style="flex:1">
                                    ${RESULTS.map(r => `<option value="${r}" ${p.result === r ? 'selected' : ''}>${r}</option>`).join('')}
                                </select>
                                <button class="delete-participant-btn" onclick="this.closest('.participant-row').remove()">🗑</button>
                            </div>
                        `).join('')}
                    </div>
                    <button id="addEditParticipantBtn" style="margin-top: 0.5rem;">➕ Добавить участника</button>
                    
                    <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                        <button id="saveEditEventBtn" style="background: #28a745;">💾 СОХРАНИТЬ ИЗМЕНЕНИЯ</button>
                        <button id="cancelEditBtn" class="btn-secondary">❌ ОТМЕНА</button>
                    </div>
                </div>
            </div>
        `;
        
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        document.getElementById('addEditParticipantBtn')?.addEventListener('click', () => {
            const container = document.getElementById('editParticipantsList');
            const newRow = document.createElement('div');
            newRow.className = 'participant-row';
            newRow.innerHTML = `
                <input type="text" class="edit-participant-name" placeholder="ФИО" style="flex:2">
                <input type="text" class="edit-participant-group" placeholder="Группа" style="flex:1">
                <input type="text" class="edit-participant-supervisor" placeholder="Руководитель" style="flex:2">
                <select class="edit-participant-result" style="flex:1">
                    ${RESULTS.map(r => `<option value="${r}">${r}</option>`).join('')}
                </select>
                <button class="delete-participant-btn" onclick="this.closest('.participant-row').remove()">🗑</button>
            `;
            container.appendChild(newRow);
        });
        
        document.getElementById('saveEditEventBtn')?.addEventListener('click', async () => {
            const updatedEvent = {
                eventId: eventId,
                name: document.getElementById('editEventName').value.trim(),
                status: document.getElementById('editEventStatus').value,
                organizers: document.getElementById('editEventOrganizers').value.trim() || 'Не указаны',
                date: document.getElementById('editEventDate').value.trim(),
                participants: []
            };
            
            const rows = document.querySelectorAll('.participant-row');
            for (const row of rows) {
                const name = row.querySelector('.edit-participant-name')?.value.trim();
                const group = row.querySelector('.edit-participant-group')?.value.trim();
                let supervisor = row.querySelector('.edit-participant-supervisor')?.value.trim();
                const result = row.querySelector('.edit-participant-result')?.value;
                if (name && group) {
                    if (!supervisor) supervisor = '—';
                    updatedEvent.participants.push({ full_name: name, group, supervisor, result });
                }
            }
            
            if (updatedEvent.participants.length === 0) {
                alert('Добавьте хотя бы одного участника!');
                return;
            }
            
            const result = await updateEventOnServer(updatedEvent);
            if (result) {
                eventsData = await loadEvents();
                render();
                document.getElementById('editModal')?.remove();
                alert('Мероприятие успешно обновлено!');
            } else {
                alert('Ошибка при обновлении!');
            }
        });
        
        document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
            document.getElementById('editModal')?.remove();
        });
    };

    function attachLoginEvents() {
        document.getElementById('loginBtn')?.addEventListener('click', async () => {
            const login = document.getElementById('login').value.trim();
            const password = document.getElementById('password').value.trim();
            const users = await loadUsers();
            if (users[login] && users[login].password === password) {
                currentUser = { ...users[login], username: login };
                eventsData = await loadEvents();
                render();
            } else {
                alert('Неверный логин или пароль!');
            }
        });
    }

    function attachMainEvents() {
        document.querySelectorAll('.status-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentStatus = btn.dataset.status;
                render();
            });
        });

        document.getElementById('logoutBtn')?.addEventListener('click', () => {
            currentUser = null;
            render();
        });

        document.getElementById('copyAllBtn')?.addEventListener('click', () => copyAllText());
        document.getElementById('copyStatsBtn')?.addEventListener('click', () => copyStats());
        document.getElementById('refreshBtn')?.addEventListener('click', async () => {
            eventsData = await loadEvents();
            render();
        });

        if (currentUser?.role === 'editor') {
            document.getElementById('markServiceNoteBtn')?.addEventListener('click', () => openMarkNoteWindow());
            document.getElementById('generateServiceNoteBtn')?.addEventListener('click', () => openMultiGenerateNoteWindow());
        }

        if (currentUser?.role === 'admin') {
            function updateParticipantsList() {
                const container = document.getElementById('participantsList');
                if (!container) return;
                if (pendingParticipants.length === 0) {
                    container.innerHTML = '<div style="color: gray;">Список пуст</div>';
                    return;
                }
                let html = '';
                const groups = {};
                for (const p of pendingParticipants) {
                    const sup = p.supervisor;
                    if (!groups[sup]) groups[sup] = [];
                    groups[sup].push(p);
                }
                for (const [sup, parts] of Object.entries(groups)) {
                    html += `<div><strong>Рук: ${escapeHtml(sup)} (${parts.length} чел.)</strong></div>`;
                    for (let i=0; i<parts.length; i++) {
                        html += `<div style="margin-left: 1rem;">${i+1}. ${escapeHtml(parts[i].full_name)} (гр.${escapeHtml(parts[i].group)}) - ${parts[i].result}</div>`;
                    }
                    html += '<div style="margin-bottom: 0.5rem;"></div>';
                }
                container.innerHTML = html;
            }

            document.getElementById('addParticipantBtn')?.addEventListener('click', () => {
                const name = document.getElementById('participantName').value.trim();
                const group = document.getElementById('participantGroup').value.trim();
                let supervisor = document.getElementById('participantSupervisor').value.trim();
                const result = document.getElementById('participantResult').value;
                if (!name || !group) { alert('Заполните ФИО и группу!'); return; }
                if (!supervisor) supervisor = '—';
                pendingParticipants.push({ full_name: name, group, supervisor, result });
                updateParticipantsList();
                document.getElementById('participantName').value = '';
                document.getElementById('participantGroup').value = '';
                document.getElementById('participantSupervisor').value = '';
            });

            document.getElementById('clearParticipantsBtn')?.addEventListener('click', () => {
                pendingParticipants = [];
                updateParticipantsList();
            });

            document.getElementById('saveEventBtn')?.addEventListener('click', async () => {
                const name = document.getElementById('eventName').value.trim();
                const status = document.getElementById('eventStatus').value;
                const organizers = document.getElementById('eventOrganizers').value.trim() || 'Не указаны';
                const date = document.getElementById('eventDate').value.trim() || new Date().toLocaleDateString('ru-RU');
                if (!name) { alert('Введите название мероприятия!'); return; }
                if (pendingParticipants.length === 0) { alert('Добавьте хотя бы одного участника!'); return; }
                const result = await saveEventToServer({ name, status, organizers, date, participants: pendingParticipants });
                if (result) {
                    pendingParticipants = [];
                    document.getElementById('eventName').value = '';
                    document.getElementById('eventOrganizers').value = '';
                    document.getElementById('eventDate').value = '';
                    updateParticipantsList();
                    eventsData = await loadEvents();
                    render();
                    alert('Мероприятие сохранено!');
                } else { alert('Ошибка сохранения!'); }
            });

            document.getElementById('manageUsersBtn')?.addEventListener('click', () => openUserManagement());
        }
    }

    // ========== КОПИРОВАНИЕ ==========
    function copyAllText() {
        const events = eventsData[currentStatus] || [];
        if (events.length === 0) { alert('Нет данных для копирования'); return; }
        let text = `УЧАСТНИКИ МЕРОПРИЯТИЙ 2025-2026 УЧЕБНЫЙ ГОД (СТУДЕНТЫ)\n${currentStatus} УРОВЕНЬ\n\n`;
        const sorted = sortEventsByDate(events);
        for (let idx = 0; idx < sorted.length; idx++) {
            const ev = sorted[idx];
            text += `========================================\n`;
            text += `№ ${idx+1}\n`;
            text += `Наименование мероприятия: ${ev.name}\n`;
            text += `Статус: ${ev.status}\n`;
            text += `Организаторы: ${ev.organizers}\n`;
            text += `Число участников: ${ev.participants_count}\n`;
            text += `Дата проведения: ${formatDate(ev.date)}\n`;
            text += `Результат: ${ev.participants[0]?.result || ''}\n`;
            text += `Служебная записка: ${ev.service_note_written ? `НАПИСАНА (${formatDate(ev.service_note_date)})` : 'НЕ НАПИСАНА'}\n`;
            text += `Участники, группа:\n`;
            const groups = groupParticipantsBySupervisor(ev.participants);
            for (const [sup, parts] of Object.entries(groups)) {
                text += `   Руководитель: ${sup}\n`;
                for (const p of parts) {
                    text += `      • ${p.full_name} (гр.${p.group}) - ${p.result}\n`;
                }
            }
            text += `========================================\n\n`;
        }
        let totalStats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 };
        let totalParts = 0;
        for (const ev of sorted) {
            for (const p of ev.participants) totalStats[p.result]++;
            totalParts += ev.participants.length;
        }
        text += `ИТОГО:\n`;
        text += `Участие: ${totalStats["Участие"]}   1-е место: ${totalStats["Диплом 1 место"]}   2-е место: ${totalStats["Диплом 2 место"]}   3-е место: ${totalStats["Диплом 3 место"]}   Номинации: ${totalStats["Номинация"]}\n`;
        text += `ВСЕГО УЧАСТНИКОВ: ${totalParts}\n`;
        navigator.clipboard.writeText(text);
        alert('Данные скопированы в буфер обмена');
    }

    function copyStats() {
        const events = eventsData[currentStatus] || [];
        const sorted = sortEventsByDate(events);
        let totalStats = { "Участие": 0, "Диплом 1 место": 0, "Диплом 2 место": 0, "Диплом 3 место": 0, "Номинация": 0 };
        let totalParts = 0;
        for (const ev of sorted) {
            for (const p of ev.participants) totalStats[p.result]++;
            totalParts += ev.participants.length;
        }
        let notesWritten = 0, notesNot = 0;
        for (const ev of sorted) {
            if (ev.service_note_written) notesWritten++;
            else notesNot++;
        }
        let text = `СТАТИСТИКА ПО ${currentStatus} УРОВНЮ\n`;
        text += `Участие: ${totalStats["Участие"]} | 1 место: ${totalStats["Диплом 1 место"]} | 2 место: ${totalStats["Диплом 2 место"]} | 3 место: ${totalStats["Диплом 3 место"]} | Номинации: ${totalStats["Номинация"]}\n`;
        text += `Всего участников: ${totalParts}\n`;
        text += `Служебные записки: написано ${notesWritten}, не написано ${notesNot}\n`;
        navigator.clipboard.writeText(text);
        alert('Статистика скопирована');
    }

    async function openMarkNoteWindow() {
        const status = prompt("Выберите уровень мероприятия:\n" + STATUSES.join("\n"), currentStatus);
        if (!status || !STATUSES.includes(status)) {
            alert("Неверный уровень!");
            return;
        }
        
        const eventsList = eventsData[status] || [];
        if (eventsList.length === 0) {
            alert("Нет мероприятий в этом уровне!");
            return;
        }
        
        let eventOptions = "";
        for (let i = 0; i < eventsList.length; i++) {
            eventOptions += `${i+1}. ${eventsList[i].name} (${formatDate(eventsList[i].date)})\n`;
        }
        
        const eventNum = prompt(`Выберите мероприятие:\n${eventOptions}`, "1");
        if (!eventNum) return;
        
        const idx = parseInt(eventNum) - 1;
        if (idx < 0 || idx >= eventsList.length) {
            alert("Неверный номер!");
            return;
        }
        
        const event = eventsList[idx];
        let date = prompt("Дата написания служебной записки (ДД.ММ.ГГГГ):", new Date().toLocaleDateString('ru-RU'));
        if (!date) return;
        
        if (!/^\d{2}\.\d{2}\.\d{4}$/.test(date)) {
            try {
                let parsedDate = new Date(date);
                if (!isNaN(parsedDate.getTime())) {
                    let day = parsedDate.getDate().toString().padStart(2, '0');
                    let month = (parsedDate.getMonth() + 1).toString().padStart(2, '0');
                    let year = parsedDate.getFullYear();
                    date = `${day}.${month}.${year}`;
                }
            } catch(e) {}
        }
        
        await updateServiceNoteOnServer(event.id, true, date);
        eventsData = await loadEvents();
        render();
        alert(`Служебная записка отмечена! Дата: ${date}`);
    }

    function openMultiGenerateNoteWindow() {
        let allEvents = [];
        for (const status of STATUSES) {
            const events = eventsData[status] || [];
            for (const e of events) {
                allEvents.push({ ...e, status });
            }
        }
        allEvents = sortEventsByDate(allEvents);
        
        let eventList = "";
        for (let i = 0; i < allEvents.length; i++) {
            eventList += `${i+1}. ${allEvents[i].name} (${allEvents[i].status}, ${formatDate(allEvents[i].date)})\n`;
        }
        
        const input = prompt(`Выберите номера мероприятий через запятую:\n\n${eventList}\n\nПример: 1,3,5`);
        if (!input) return;
        
        const numbers = input.split(",").map(n => parseInt(n.trim())).filter(n => !isNaN(n) && n > 0 && n <= allEvents.length);
        const selectedEvents = numbers.map(n => allEvents[n-1]);
        
        if (selectedEvents.length === 0) {
            alert("Не выбрано ни одного мероприятия!");
            return;
        }
        
        const noteNumber = prompt("№ служебной записки:", "01-03/2026") || "___";
        const today = new Date().toLocaleDateString('ru-RU');
        
        let allPrizeParticipants = [];
        for (const ev of selectedEvents) {
            const fullEvent = eventsData[ev.status]?.find(e => e.id === ev.id);
            if (!fullEvent) continue;
            const prizeParticipants = fullEvent.participants.filter(p => PRIZE_RESULTS.includes(p.result));
            if (prizeParticipants.length > 0) {
                allPrizeParticipants.push({ event: fullEvent, participants: prizeParticipants });
            }
        }
        
        if (allPrizeParticipants.length === 0) {
            alert("В выбранных мероприятиях нет призовых мест!");
            return;
        }
        
        let eventsText = '';
        for (const item of allPrizeParticipants) {
            const ev = item.event;
            const groups = groupParticipantsBySupervisor(item.participants);
            eventsText += `\n${'─'.repeat(70)}\n`;
            eventsText += `МЕРОПРИЯТИЕ: ${ev.name}\n`;
            eventsText += `Статус: ${ev.status}\n`;
            eventsText += `Дата проведения: ${formatDate(ev.date)}\n`;
            eventsText += `РЕЗУЛЬТАТЫ (призовые места):\n`;
            for (const [sup, parts] of Object.entries(groups)) {
                eventsText += `Руководитель: ${sup}\n`;
                for (const p of parts) {
                    eventsText += `  - ${p.full_name} (гр.${p.group}) — ${p.result}\n`;
                }
            }
        }
        
        const result = `
═══════════════════════════════════════════════════════════════
                    СЛУЖЕБНАЯ ЗАПИСКА № ${noteNumber}
═══════════════════════════════════════════════════════════════

Дата: ${today}

Настоящим сообщаю о результатах участия студентов 
Альметьевского политехнического техникума в следующих мероприятиях:
${eventsText}
${'═'.repeat(70)}

Итого по всем мероприятиям: ${allPrizeParticipants.reduce((sum, item) => sum + item.participants.length, 0)} призовых мест

═══════════════════════════════════════════════════════════════
Методист _________________ / Рахуба К.А. /
═══════════════════════════════════════════════════════════════
        `;
        
        navigator.clipboard.writeText(result);
        alert("Текст служебной записки скопирован в буфер обмена!");
    }

    async function openUserManagement() {
        const users = await loadUsers();
        let userList = "ТЕКУЩИЕ ПОЛЬЗОВАТЕЛИ:\n\n";
        for (const [login, data] of Object.entries(users)) {
            userList += `Логин: ${login} | Имя: ${data.name} | Роль: ${data.role} | Пароль: ${data.password}\n`;
        }
        
        const action = prompt(`${userList}\n\nЧто сделать?\n1 - Добавить пользователя\n2 - Удалить пользователя\n3 - Назад`, "3");
        
        if (action === "1") {
            const newLogin = prompt("Логин:");
            if (!newLogin) return;
            const newPassword = prompt("Пароль:");
            if (!newPassword) return;
            const newName = prompt("Имя:");
            if (!newName) return;
            const newRole = prompt("Роль (admin/editor/viewer):", "viewer");
            const result = await saveUserToServer({ login: newLogin, password: newPassword, name: newName, role: newRole });
            if (result) {
                alert("Пользователь добавлен!");
                eventsData = await loadEvents();
                render();
            } else { alert("Ошибка при добавлении!"); }
        } else if (action === "2") {
            const deleteLogin = prompt("Введите логин пользователя для удаления:");
            if (!deleteLogin || deleteLogin === "muhanov") { alert("Нельзя удалить главного администратора!"); return; }
            const result = await deleteUserOnServer(deleteLogin);
            if (result) {
                alert("Пользователь удалён!");
                eventsData = await loadEvents();
                render();
            } else { alert("Ошибка при удалении!"); }
        }
    }

    (async function init() {
        eventsData = await loadEvents();
        render();
    })();
</script>
